<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print your map — Six-Axis Political Compass</title>
<meta name="description" content="Configure and order custom apparel with your six-axis compass radar chart.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="manifest" href="manifest.json">
<style>
:root {
  --bg: #0f0f0f;
  --bg3: #242424;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #e8e4da;
  --text2: #8a8680;
  --text3: #9a9690;
  --gold: #c8a84b;
  --gold-dim: rgba(200,168,75,0.12);
  --serif: Georgia, 'Times New Roman', serif;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

  --chart-grid: rgba(255,255,255,0.07);
  --chart-axis: rgba(255,255,255,0.1);
  --chart-label: rgba(232,228,218,0.55);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.6;
  min-height: 100vh;
}

.wrap {
  max-width: 600px;
  margin: 0 auto;
  padding: 3rem 1.5rem 4rem;
}

.wrap--wide {
  max-width: 1100px;
}

.results-layout {
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 2.5rem;
  align-items: start;
}

.chart-pane {
  position: sticky;
  top: 3rem;
  align-self: start;
}

.content-pane {
  min-width: 0;
}

.group-header {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-basis: 100%;
  margin-bottom: 4px;
}

.group-reorder {
  display: flex;
  gap: 2px;
  margin-left: auto;
}

.group-reorder button {
  background: none;
  border: none;
  color: var(--text3);
  font-size: 13px;
  cursor: pointer;
  padding: 2px 6px;
  line-height: 1;
  border-radius: 2px;
  transition: color 0.15s, background 0.15s;
}

.group-reorder button:hover {
  color: var(--text2);
  background: rgba(255,255,255,0.06);
}

.group-reorder button:disabled {
  opacity: 0.25;
  cursor: default;
}

[data-theme="light"] .group-reorder button:hover {
  background: rgba(0,0,0,0.06);
}

@media (max-width: 900px) {
  .results-layout {
    grid-template-columns: 1fr;
    gap: 1.5rem;
  }
  .chart-pane {
    position: static;
  }
  .wrap--wide {
    max-width: 600px;
  }
}

.screen {
  display: none;
}

.screen.active {
  display: block;
}

.eyebrow {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 1rem;
}

.intro-title {
  font-family: var(--serif);
  font-size: clamp(28px, 5vw, 38px);
  font-weight: 400;
  line-height: 1.2;
  margin-bottom: 1.25rem;
}

.intro-body {
  color: var(--text2);
  font-size: 15px;
  line-height: 1.7;
  margin-bottom: 0.5rem;
}

.intro-meta {
  color: var(--text3);
  font-size: 13px;
  margin-bottom: 2.5rem;
}

.intro-disclaimer {
  margin-top: 1.25rem;
  font-size: 12px;
  color: var(--text3);
}

.data-link {
  display: inline-block;
  margin-top: 0.75rem;
  font-size: 0.85rem;
  color: var(--text2);
  text-decoration: none;
  transition: color 0.15s;
}

.data-link:hover {
  color: var(--gold);
  text-decoration: underline;
}

.intro-upload {
  margin-top: 1.5rem;
}

.intro-file-label {
  font-size: 13px;
  padding: 8px 16px;
  border: 0.5px solid var(--border2);
  color: var(--text2);
  cursor: pointer;
  font-family: inherit;
  border-radius: 2px;
  display: inline-block;
  transition: border-color 0.15s, color 0.15s;
}

.intro-file-label:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.intro-file-input {
  display: none;
}

.btn {
  display: inline-block;
  background: none;
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  padding: 10px 28px;
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}

.btn:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.btn-primary {
  border-color: var(--gold);
  color: var(--gold);
}

.btn-primary:hover {
  background: var(--gold-dim);
}

.btn-sm {
  font-size: 12px;
  padding: 5px 12px;
  border-width: 0.5px;
}

.btn-text {
  border: none;
  color: var(--text3);
  font-size: 13px;
  padding: 4px 0;
  cursor: pointer;
  background: none;
  font-family: var(--sans);
  transition: color 0.15s;
}

.btn-text:hover {
  color: var(--text2);
}

.progress-wrap {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 2.25rem;
}

.progress-bar {
  flex: 1;
  height: 2px;
  background: var(--bg3);
  border-radius: 1px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 1px;
  transition: width 0.35s ease;
  width: 0;
}

.progress-label {
  font-size: 11px;
  color: var(--text3);
  white-space: nowrap;
  min-width: 40px;
  text-align: right;
}

.axis-tag {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.6rem;
}

.q-text {
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 400;
  line-height: 1.5;
  margin-bottom: 1.75rem;
}

.responses {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.response-btn {
  background: none;
  border: 0.5px solid var(--border);
  color: var(--text2);
  font-family: var(--sans);
  font-size: 14px;
  padding: 11px 16px;
  text-align: left;
  cursor: pointer;
  transition: border-color 0.12s, color 0.12s, background 0.12s;
  border-radius: 2px;
}

.response-btn:hover,
.response-btn.selected {
  border-color: var(--gold);
  color: var(--gold);
  background: var(--gold-dim);
}

.results-title {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 400;
  margin-bottom: 2rem;
}

.chart-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 1.5rem;
}

.actor-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  margin-bottom: 0.5rem;
}

.actor-groups {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 1.25rem;
}

.actor-group {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 7px;
}

.actor-group-label {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  flex-basis: 100%;
  margin-bottom: 2px;
}

.actor-label {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-right: 4px;
}

.actor-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}

.actor-btn-wrap {
  display: flex;
  align-items: center;
  gap: 3px;
}

.actor-info-btn,
.actor-del-btn {
  background: none;
  border: none;
  color: var(--text3);
  font-size: 13px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
  transition: color 0.15s;
}

.actor-info-btn {
  font-family: Georgia, serif;
  font-style: italic;
  font-weight: 600;
}

.actor-info-btn:hover {
  color: var(--gold);
}

.actor-del-btn {
  font-size: 15px;
}

.actor-del-btn:hover {
  color: #c0392b;
}

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 2rem;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
}

.legend-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}

.legend-name {
  font-size: 12px;
  color: var(--text2);
}

.score-bars {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 2.5rem;
}

.score-row {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.score-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
}

.score-name {
  font-size: 13px;
}

.score-val {
  font-size: 12px;
  color: var(--text3);
}

.score-track {
  height: 5px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 5px;
}

.score-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 2px;
  transition: width 0.5s ease;
}

.score-ends {
  display: flex;
  justify-content: space-between;
  gap: 12px;
}

.score-end {
  font-size: 11px;
  color: var(--text3);
}

.actor-bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.actor-bar-name {
  font-size: 11px;
  color: var(--text2);
  width: 80px;
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.actor-bar-track {
  flex: 1;
  height: 4px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}

.actor-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s ease;
}

.actor-bar-val {
  font-size: 11px;
  color: var(--text3);
  width: 28px;
  text-align: right;
  flex-shrink: 0;
}

.divider {
  border: none;
  border-top: 0.5px solid var(--border);
  margin: 2rem 0;
}

.footer-note {
  font-size: 13px;
  color: var(--text3);
  line-height: 1.65;
  margin-bottom: 1.5rem;
}

.footer-note a {
  color: var(--gold);
  text-decoration: none;
}

.footer-note a:hover {
  text-decoration: underline;
}

/* Configuration panel */
.config-section {
  margin-bottom: 1.25rem;
}

.config-heading {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 0.6rem;
}

.config-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.config-btn {
  font-size: 12px;
  padding: 5px 12px;
  border: 0.5px solid var(--border2);
  color: var(--text2);
  background: none;
  cursor: pointer;
  font-family: inherit;
  border-radius: 2px;
}

.config-btn.active {
  border-color: var(--gold);
  color: var(--gold);
  background: var(--gold-dim);
}

.config-file-label {
  font-size: 12px;
  padding: 5px 12px;
  border: 0.5px solid var(--border2);
  color: var(--text2);
  cursor: pointer;
  font-family: inherit;
  border-radius: 2px;
  display: inline-block;
}

.config-file-input {
  display: none;
}

.config-note {
  font-size: 11px;
  color: var(--text3);
  margin-top: 0.5rem;
}

.axis-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.axis-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 10px;
  border: 0.5px solid var(--border);
  border-radius: 2px;
  cursor: grab;
  background: var(--bg3);
  user-select: none;
}

.axis-item.dragging {
  opacity: 0.4;
}

.axis-grip {
  color: var(--text3);
  font-size: 14px;
  line-height: 1;
}

.axis-name {
  font-size: 13px;
  color: var(--text2);
}

.axis-position {
  font-size: 11px;
  color: var(--text3);
  margin-left: auto;
}

.axis-invert {
  font-size: 13px;
  color: var(--text3);
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 3px;
  line-height: 1;
  transition: color 0.15s, background 0.15s;
}

.axis-invert:hover {
  color: var(--text);
  background: rgba(255,255,255,0.06);
}

.axis-invert.active {
  color: var(--gold);
}

[data-theme="light"] {
  --bg: #f5f3ef;
  --bg3: #e8e4da;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.15);
  --text: #1a1a1a;
  --text2: #5a5650;
  --text3: #6a665e;
  --gold: #8b6914;
  --gold-dim: rgba(139,105,20,0.12);
  --chart-grid: rgba(0,0,0,0.07);
  --chart-axis: rgba(0,0,0,0.1);
  --chart-label: rgba(26,26,26,0.55);
}

.site-footer {
  text-align: center;
  padding: 1.5rem 1rem 2rem;
  font-size: 12px;
  color: var(--text3);
  line-height: 1.6;
}

.footer-link {
  color: var(--text3);
  text-decoration: none;
  transition: color 0.15s;
}

.footer-link:hover {
  color: var(--gold);
  text-decoration: underline;
}

.footer-sep {
  margin: 0 6px;
  opacity: 0.5;
}

.footer-ver {
  font-variant-numeric: tabular-nums;
}

.skip-link {
  position: absolute;
  top: -40px;
  left: 0;
  background: var(--bg);
  color: var(--text);
  padding: 8px 16px;
  z-index: 100;
  transition: top 0.2s;
  border: 1px solid var(--border2);
  font-size: 13px;
  text-decoration: none;
}
.skip-link:focus {
  top: 0;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

[tabindex="-1"]:focus {
  outline: none;
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.65);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 2rem 1rem;
  z-index: 200;
  overflow-y: auto;
}

.modal-content {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 4px;
  max-width: 520px;
  width: 100%;
  padding: 1.5rem;
  position: relative;
}

.modal-close {
  position: absolute;
  top: 10px;
  right: 12px;
  background: none;
  border: none;
  color: var(--text3);
  font-size: 22px;
  line-height: 1;
  cursor: pointer;
  padding: 0;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.15s;
}

.modal-close:hover {
  color: var(--text);
}

.modal-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1rem;
}

.modal-color {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
}

.modal-title {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 400;
  margin: 0;
}

.modal-category {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.modal-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 1.25rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--border);
}

.modal-axes {
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}

.modal-axis-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 0.5rem;
}

.modal-axis-name {
  font-size: 14px;
  font-weight: 500;
}

.modal-axis-score {
  font-size: 14px;
  font-weight: 600;
  color: var(--gold);
  min-width: 32px;
  text-align: center;
}

.confidence-badge {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 2px 8px;
  border-radius: 2px;
  border: 1px solid;
}

.confidence-high {
  color: #5a9e3f;
  border-color: rgba(90, 158, 63, 0.4);
  background: rgba(90, 158, 63, 0.08);
}

.confidence-medium {
  color: #c8a84b;
  border-color: rgba(200, 168, 75, 0.4);
  background: rgba(200, 168, 75, 0.08);
}

.confidence-low {
  color: #c0392b;
  border-color: rgba(192, 57, 43, 0.4);
  background: rgba(192, 57, 43, 0.08);
}

.modal-rationale {
  font-size: 13px;
  line-height: 1.6;
  color: var(--text2);
  margin-bottom: 0.75rem;
}

.modal-sources-heading {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text3);
  margin-bottom: 0.5rem;
}

.modal-no-sources {
  font-size: 12px;
  color: var(--text3);
  font-style: italic;
}

.modal-source {
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 10px 12px;
  margin-bottom: 8px;
}

.source-header {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.source-type {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text3);
  border: 1px solid var(--border2);
  padding: 1px 6px;
  border-radius: 2px;
}

.source-link {
  font-size: 12px;
  color: var(--gold);
  text-decoration: none;
}

.source-link:hover {
  text-decoration: underline;
}

.source-date {
  font-size: 11px;
  color: var(--text3);
  margin-left: auto;
}

.source-quote {
  font-size: 12px;
  line-height: 1.5;
  color: var(--text2);
  border-left: 2px solid var(--border2);
  padding-left: 10px;
  margin: 6px 0;
  font-style: italic;
}

.source-cite {
  font-size: 11px;
  color: var(--text3);
  display: block;
  margin-top: 4px;
}

/* Merch preview (results) */
.merch-preview {
  margin-top: 1.5rem;
  padding-top: 1.25rem;
  border-top: 1px solid var(--border2);
}

.merch-badge {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--gold);
  border: 1px solid var(--gold);
  padding: 2px 8px;
  border-radius: 2px;
  margin-bottom: 0.5rem;
}

.merch-heading {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 0.75rem;
  color: var(--text2);
}

.merch-mockup-wrap {
  position: relative;
  max-width: 280px;
  margin: 0 auto 0.75rem;
}

.merch-mockup-frame {
  position: relative;
  aspect-ratio: 4 / 5;
  overflow: hidden;
  border-radius: 4px;
}

.merch-garment-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.merch-chart-overlay {
  position: absolute;
  left: 50%;
  top: 42%;
  transform: translate(-50%, -50%);
  width: 52%;
  aspect-ratio: 1;
  pointer-events: none;
}

.merch-radar-svg {
  width: 100%;
  height: 100%;
  display: block;
}

.merch-carousel-prev,
.merch-carousel-next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0, 0, 0, 0.35);
  border: none;
  color: #fff;
  width: 28px;
  height: 36px;
  font-size: 20px;
  cursor: pointer;
  border-radius: 2px;
  z-index: 2;
}

.merch-carousel-prev {
  left: 4px;
}

.merch-carousel-next {
  right: 4px;
}

.merch-carousel-prev:disabled,
.merch-carousel-next:disabled {
  opacity: 0.3;
  cursor: default;
}

.merch-carousel-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 0.75rem;
}

.merch-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  border: 1px solid var(--border2);
  background: transparent;
  padding: 0;
  cursor: pointer;
}

.merch-dot.active {
  background: var(--gold);

const AXIS_KEYS = {
  Cultural: 'c',
  Economic: 'e',
  Military: 'm',
  Sovereignty: 's',
  Governance: 'l',
  Class: 'a'
};

const KEY_TO_AXIS = Object.fromEntries(
  Object.entries(AXIS_KEYS).map(([k, v]) => [v, k])
);
function encodeHash(scores, orientation, axesOrder, invertedAxes) {
  const scoreParts = axesOrder.map(ax => `${AXIS_KEYS[ax]}=${scores[ax].toFixed(1)}`);
  const orderCode = axesOrder.map(ax => AXIS_KEYS[ax]).join('');
  const invertCode = (invertedAxes && invertedAxes.size > 0)
    ? axesOrder.filter(ax => invertedAxes.has(ax)).map(ax => AXIS_KEYS[ax]).join('')
    : '';
  let hash = `#v2;${scoreParts.join(',')};o=${orientation};x=${orderCode}`;
  if (invertCode) hash += `;i=${invertCode}`;
  return hash;
}
function decodeHash(hash) {
  if (!hash || hash.length < 2) return null;
  const str = hash.startsWith('#') ? hash.slice(1) : hash;
  const parts = str.split(';');
  const urlVersion = parts[0];
  if (urlVersion !== 'v1' && urlVersion !== 'v2') return null;

  const scores = {};
  let orientation = 'flat';
  let axesOrder = null;
  let invertedAxes = [];

  for (let i = 1; i < parts.length; i++) {
    const part = parts[i];
    if (!part) continue;
    if (part.startsWith('o=')) {
      orientation = part.slice(2);
    } else if (part.startsWith('x=')) {
      axesOrder = part.slice(2).split('').map(k => KEY_TO_AXIS[k]).filter(Boolean);
    } else if (part.startsWith('i=')) {
      invertedAxes = part.slice(2).split('').map(k => KEY_TO_AXIS[k]).filter(Boolean);
    } else if (part.includes('=')) {
      const pairs = part.split(',');
      pairs.forEach(pair => {
        const [pk, pv] = pair.split('=');
        const axis = KEY_TO_AXIS[pk];
        if (axis) scores[axis] = parseFloat(pv);
      });
    }
  }

  if (Object.keys(scores).length === 0) return null;

  // v1 URLs store Governance scores computed with inverted questions (low=autonomy, high=hierarchy).
  // v2 URLs store Governance scores with corrected polarity (low=hierarchy, high=autonomy).
  if (urlVersion === 'v1' && scores.Governance !== undefined) {
    scores.Governance = parseFloat((10 - scores.Governance).toFixed(1));
  }

  return { scores, orientation, axesOrder, invertedAxes };
}
function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text);
  }
  return new Promise((resolve) => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
    } catch (_) {}
    document.body.removeChild(ta);
    resolve();
  });
}



const DRAFT_KEY = 'six-axis-compass-merch-draft';
const MAX_ACTOR_SLUGS = 2;
function getActorSlug(actor) {
  if (actor._actorMeta?.slug) return actor._actorMeta.slug;
  return 'c:' + actor.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}
function resolveActorBySlug(slug, customActors = []) {
  const all = [...(typeof ACTORS !== 'undefined' ? ACTORS : []), ...customActors];
  if (slug.startsWith('c:')) {
    const namePart = slug.slice(2).replace(/-/g, ' ');
    return customActors.find(a =>
      getActorSlug(a) === slug ||
      a.name.toLowerCase().replace(/[^a-z0-9]+/g, '-') === slug.slice(2)
    ) || all.find(a => getActorSlug(a) === slug);
  }
  return all.find(a => a._actorMeta?.slug === slug || getActorSlug(a) === slug);
}
function slugsFromSelectedActors(selectedNames, customActors = []) {
  const all = [...(typeof ACTORS !== 'undefined' ? ACTORS : []), ...customActors];
  return selectedNames
    .map(name => {
      const actor = all.find(a => a.name === name);
      return actor ? getActorSlug(actor) : null;
    })
    .filter(Boolean)
    .slice(0, MAX_ACTOR_SLUGS);
}
function encodeMerchHash(state) {
  const {
    scores,
    orientation,
    axesOrder,
    invertedAxes,
    actorSlugs = [],
    garment = 'tee',
    garmentColor = 'white',
    chartTheme = 'light',
    register = 'primary'
  } = state;
  let hash = encodeHash(scores, orientation, axesOrder, invertedAxes);
  hash = hash.replace('#v2', '#v3');
  if (actorSlugs.length) hash += `;a=${actorSlugs.join(',')}`;
  hash += `;g=${garment};gc=${garmentColor};th=${chartTheme};reg=${register}`;
  return hash;
}
function decodeMerchHash(hash) {
  if (!hash || hash.length < 2) return null;
  const str = hash.startsWith('#') ? hash.slice(1) : hash;
  const parts = str.split(';');
  const urlVersion = parts[0];

  if (urlVersion !== 'v3') {
    const v2 = decodeHash(hash.startsWith('#') ? hash : '#' + hash);
    if (!v2) return null;
    return {
      ...v2,
      actorSlugs: [],
      garment: 'tee',
      garmentColor: 'white',
      chartTheme: 'light',
      register: 'primary'
    };
  }

  const v2parts = parts.filter(p =>
    p && !p.startsWith('a=') && !p.startsWith('g=') && !p.startsWith('gc=') &&
    !p.startsWith('th=') && !p.startsWith('reg=')
  );
  const decoded = decodeHash('#' + v2parts.join(';').replace(/^v3/, 'v2'));
  if (!decoded) return null;

  let actorSlugs = [];
  let garment = 'tee';
  let garmentColor = 'white';
  let chartTheme = 'light';
  let register = 'primary';

  for (let i = 1; i < parts.length; i++) {
    const part = parts[i];
    if (!part) continue;
    if (part.startsWith('a=')) {
      actorSlugs = part.slice(2).split(',').filter(Boolean).slice(0, MAX_ACTOR_SLUGS);
    } else if (part.startsWith('gc=')) {
      garmentColor = part.slice(3);
    } else if (part.startsWith('th=')) {
      chartTheme = part.slice(3);
    } else if (part.startsWith('reg=')) {
      register = part.slice(4);
    } else if (part.startsWith('g=')) {
      garment = part.slice(2);
    }
  }

  return {
    ...decoded,
    actorSlugs,
    garment,
    garmentColor,
    chartTheme,
    register
  };
}

}
function mergeMerchState(hashDecoded, draft) {
  const base = hashDecoded || {};

    orientation: d.orientation ?? base.orientation ?? 'flat',
    axesOrder: d.axesOrder || base.axesOrder,
    invertedAxes: d.invertedAxes?.length ? d.invertedAxes : (base.invertedAxes || []),
    actorSlugs: d.actorSlugs?.length ? d.actorSlugs : (base.actorSlugs || []),
    selectedActorNames: d.selectedActorNames || [],
    customActors: d.customActors || [],
    uploadedMap: d.uploadedMap ?? null,
    showUser: d.showUser !== false && base.showUser !== false,
    register: d.register || base.register || 'primary',
    garment: d.garment || base.garment || 'tee',
    garmentColor: d.garmentColor || base.garmentColor || 'white',
    chartTheme: d.chartTheme || base.chartTheme || 'light',
    size: d.size || 'M'
  };
}

const NS = 'http://www.w3.org/2000/svg';

function createSVGElement(tag, attrs) {
  const el = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function startAngleForOrientation(orientation) {
  if (orientation === 'spatial') return 120;
  if (orientation === 'pointy') return -90;
  return -60;
}

function axisPoint(cx, cy, maxR, index, value, orientation) {
  const start = startAngleForOrientation(orientation);
  const angle = (index * 60 + start) * (Math.PI / 180);
  const dist = (value / 10) * maxR;
  return [cx + dist * Math.cos(angle), cy + dist * Math.sin(angle)];
}

function polygonPoints(cx, cy, maxR, scores, axes, orientation) {
  return axes.map((ax, i) => {
    const [x, y] = axisPoint(cx, cy, maxR, i, scores[ax] || 0, orientation);
    return `${x.toFixed(2)},${y.toFixed(2)}`;
  }).join(' ');
}
function drawRadar(svg, {
  scores,
  axes,
  orientation = 'flat',
  actors = [],
  uploadedMap = null,
  showUser = true,
  userColor = '#c8a84b',
  uploadedColor = '#b478dc',
  invertedAxes = new Set(),
  register = 'primary'
}) {
  svg.innerHTML = '';
  const cx = 160, cy = 160, maxR = 108;

  function displayScore(ax, val) {
    return invertedAxes && invertedAxes.has(ax) ? 10 - val : val;
  }

  function displayScores(source) {
    const out = {};
    for (const ax of axes) out[ax] = displayScore(ax, source[ax] || 0);
    return out;
  }

  // Grid polygons at levels 2, 4, 6, 8, 10
  for (const level of [2, 4, 6, 8, 10]) {
    const gridScores = Object.fromEntries(axes.map(a => [a, level]));
    svg.appendChild(createSVGElement('polygon', {
      points: polygonPoints(cx, cy, maxR, gridScores, axes, orientation),
      fill: 'none',
      stroke: 'var(--chart-grid)',
      'stroke-width': '1'
    }));
  }

  // Axis lines
  axes.forEach((_, i) => {
    const [x, y] = axisPoint(cx, cy, maxR, i, 10, orientation);
    svg.appendChild(createSVGElement('line', {
      x1: cx, y1: cy, x2: x, y2: y,
      stroke: 'var(--chart-axis)', 'stroke-width': '1'
    }));
  });

  // User profile (drawn first so actors overlay it)
  if (showUser) {
    const disp = displayScores(scores);
    svg.appendChild(createSVGElement('polygon', {
      points: polygonPoints(cx, cy, maxR, disp, axes, orientation),
      fill: userColor + '1e',
      stroke: userColor,
      'stroke-width': '2.5'
    }));
    axes.forEach((ax, i) => {
      const [x, y] = axisPoint(cx, cy, maxR, i, disp[ax], orientation);
      svg.appendChild(createSVGElement('circle', { cx: x, cy: y, r: '4', fill: userColor }));
    });
  }

  // Uploaded map overlay
  if (uploadedMap) {
    const disp = displayScores(uploadedMap.scores);
    svg.appendChild(createSVGElement('polygon', {
      points: polygonPoints(cx, cy, maxR, disp, axes, orientation),
      fill: 'rgba(180,120,220,0.12)',
      stroke: uploadedColor,
      'stroke-width': '2',
      'stroke-dasharray': '6,3'
    }));
    axes.forEach((ax, i) => {
      const [x, y] = axisPoint(cx, cy, maxR, i, disp[ax], orientation);
      svg.appendChild(createSVGElement('circle', { cx: x, cy: y, r: '3.5', fill: uploadedColor }));
    });
  }

  // Actor overlays (drawn last so they sit on top)
  for (const actor of actors) {
    const effectiveScores = getEffectiveScores(actor, register);
    svg.appendChild(createSVGElement('polygon', {
      points: polygonPoints(cx, cy, maxR, displayScores(effectiveScores), axes, orientation),
      fill: actor.color + '18',
      stroke: actor.color + '80',
      'stroke-width': '1.5'
    }));
  }

  // Axis labels
  axes.forEach((ax, i) => {
    const [lx, ly] = axisPoint(cx, cy, maxR + 26, i, 10, orientation);
    const labelEl = createSVGElement('text', {
      x: lx.toFixed(2), y: ly.toFixed(2),
      'text-anchor': 'middle', 'dominant-baseline': 'middle',
      'font-size': '11', 'font-family': '-apple-system,BlinkMacSystemFont,sans-serif',
      fill: 'var(--chart-label)'
    });
    labelEl.textContent = t('axis.' + ax);
    svg.appendChild(labelEl);
  });
}

    if (actor) {
      resolved.push({
        ...actor,
        scores: getEffectiveScores(actor, state.register || 'primary')
      });
    }
  }
  return resolved;
}

function pushShopHash(state) {

import {
  decodeMerchHash,
  loadMerchDraft,
  saveMerchDraft,
  mergeMerchState,
  getActorSlug,
  resolveActorBySlug
} from './merch-url.js';


const app = document.getElementById('app');

function redirectNeedsResults() {
  window.location.replace('index.html?shop=needs-results');
}

function loadState() {
  const hashDecoded = decodeMerchHash(window.location.hash);
  const draft = loadMerchDraft();
  const merged = mergeMerchState(hashDecoded, draft);
  if (!merged.scores || Object.keys(merged.scores).length === 0) {
    return null;
  }
  if (!merged.axesOrder || merged.axesOrder.length !== 6) {
    merged.axesOrder = [...AXES];
  }
  return merged;
}

let state = loadState();
if (!state) {
  redirectNeedsResults();
}

function compassHashForBack() {
  return encodeHash(
    state.scores,
    state.orientation,
    state.axesOrder,
    new Set(state.invertedAxes || [])
  );
}

function persist() {
  saveMerchDraft(state);
  pushShopHash(state);
}

function syncActorSlugsFromNames() {
  const custom = state.customActors || [];
  state.actorSlugs = (state.selectedActorNames || [])
    .map(name => {
      const actor = [...ACTORS, ...custom].find(a => a.name === name);
      return actor ? getActorSlug(actor) : null;
    })
    .filter(Boolean)
    .slice(0, 2);
}

if (state.selectedActorNames?.length && !state.actorSlugs?.length) {
  syncActorSlugsFromNames();
}

function render() {
  renderShop(app, {
    scores: state.scores,
    axesOrder: state.axesOrder,
    orientation: state.orientation,
    invertedAxes: state.invertedAxes,
    showUser: state.showUser,
    uploadedMap: state.uploadedMap,
    register: state.register,
    garment: state.garment,
    garmentColor: state.garmentColor,
    chartTheme: state.chartTheme,
    size: state.size,
    customActors: state.customActors,
    actorSlugs: state.actorSlugs,
    compassHash: compassHashForBack(),
    onGarmentChange: (id) => {
      state.garment = id;
      persist();
      render();
    },
    onGarmentColorChange: (c) => {
      state.garmentColor = c;
      state.chartTheme = c === 'black' ? 'dark' : 'light';
      persist();
      render();
    },
    onSizeChange: (s) => {
      state.size = s;
      persist();
      render();
    },
    onToggleActor: (slug) => {
      const slugs = [...(state.actorSlugs || [])];
      const idx = slugs.indexOf(slug);
      if (idx >= 0) {
        slugs.splice(idx, 1);
      } else if (slugs.length < 2) {
        slugs.push(slug);
      }
      state.actorSlugs = slugs;
      const custom = state.customActors || [];
      state.selectedActorNames = slugs
        .map(s => resolveActorBySlug(s, custom)?.name)
        .filter(Boolean);
      persist();
      render();
    },
    onCheckout: () => openShopCheckout(state)
  });
}

document.documentElement.setAttribute('data-theme', (() => {
  try {
    const stored = localStorage.getItem('six-axis-compass-theme');
    if (stored === 'light' || stored === 'dark') return stored;
  } catch (_) {}
  return 'dark';
})());

setLanguage('en');
