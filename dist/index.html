<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Six-Axis Political Compass</title>
<meta name="description" content="Map your position across six political axes: Cultural, Economic, Military, Sovereignty, Governance, and Class.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<style>
:root {
  --bg: #0f0f0f;
  --bg3: #242424;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #e8e4da;
  --text2: #8a8680;
  --text3: #9a9690;
  --gold: #c8a84b;
  --gold-dim: rgba(200,168,75,0.12);
  --serif: Georgia, 'Times New Roman', serif;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

  --chart-grid: rgba(255,255,255,0.07);
  --chart-axis: rgba(255,255,255,0.1);
  --chart-label: rgba(232,228,218,0.55);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.6;
  min-height: 100vh;
}

.wrap {
  max-width: 600px;
  margin: 0 auto;
  padding: 3rem 1.5rem 4rem;
}

.wrap--wide {
  max-width: 1100px;
}

.results-layout {
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 2.5rem;
  align-items: start;
}

.chart-pane {
  position: sticky;
  top: 3rem;
  align-self: start;
}

.content-pane {
  min-width: 0;
}

.group-header {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-basis: 100%;
  margin-bottom: 4px;
}

.group-reorder {
  display: flex;
  gap: 2px;
  margin-left: auto;
}

.group-reorder button {
  background: none;
  border: none;
  color: var(--text3);
  font-size: 13px;
  cursor: pointer;
  padding: 2px 6px;
  line-height: 1;
  border-radius: 2px;
  transition: color 0.15s, background 0.15s;
}

.group-reorder button:hover {
  color: var(--text2);
  background: rgba(255,255,255,0.06);
}

.group-reorder button:disabled {
  opacity: 0.25;
  cursor: default;
}

[data-theme="light"] .group-reorder button:hover {
  background: rgba(0,0,0,0.06);
}

@media (max-width: 900px) {
  .results-layout {
    grid-template-columns: 1fr;
    gap: 1.5rem;
  }
  .chart-pane {
    position: static;
  }
  .wrap--wide {
    max-width: 600px;
  }
}

.screen {
  display: none;
}

.screen.active {
  display: block;
}

.eyebrow {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 1rem;
}

.intro-title {
  font-family: var(--serif);
  font-size: clamp(28px, 5vw, 38px);
  font-weight: 400;
  line-height: 1.2;
  margin-bottom: 1.25rem;
}

.intro-body {
  color: var(--text2);
  font-size: 15px;
  line-height: 1.7;
  margin-bottom: 0.5rem;
}

.intro-meta {
  color: var(--text3);
  font-size: 13px;
  margin-bottom: 2.5rem;
}

.intro-disclaimer {
  margin-top: 1.25rem;
  font-size: 12px;
  color: var(--text3);
}

.data-link {
  display: inline-block;
  margin-top: 0.75rem;
  font-size: 0.85rem;
  color: var(--text2);
  text-decoration: none;
  transition: color 0.15s;
}

.data-link:hover {
  color: var(--gold);
  text-decoration: underline;
}

.intro-upload {
  margin-top: 1.5rem;
}

.intro-file-label {
  font-size: 13px;
  padding: 8px 16px;
  border: 0.5px solid var(--border2);
  color: var(--text2);
  cursor: pointer;
  font-family: inherit;
  border-radius: 2px;
  display: inline-block;
  transition: border-color 0.15s, color 0.15s;
}

.intro-file-label:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.intro-file-input {
  display: none;
}

.btn {
  display: inline-block;
  background: none;
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  padding: 10px 28px;
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}

.btn:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.btn-primary {
  border-color: var(--gold);
  color: var(--gold);
}

.btn-primary:hover {
  background: var(--gold-dim);
}

.btn-sm {
  font-size: 12px;
  padding: 5px 12px;
  border-width: 0.5px;
}

.btn-text {
  border: none;
  color: var(--text3);
  font-size: 13px;
  padding: 4px 0;
  cursor: pointer;
  background: none;
  font-family: var(--sans);
  transition: color 0.15s;
}

.btn-text:hover {
  color: var(--text2);
}

.progress-wrap {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 2.25rem;
}

.progress-bar {
  flex: 1;
  height: 2px;
  background: var(--bg3);
  border-radius: 1px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 1px;
  transition: width 0.35s ease;
  width: 0;
}

.progress-label {
  font-size: 11px;
  color: var(--text3);
  white-space: nowrap;
  min-width: 40px;
  text-align: right;
}

.axis-tag {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.6rem;
}

.q-text {
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 400;
  line-height: 1.5;
  margin-bottom: 1.75rem;
}

.responses {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.response-btn {
  background: none;
  border: 0.5px solid var(--border);
  color: var(--text2);
  font-family: var(--sans);
  font-size: 14px;
  padding: 11px 16px;
  text-align: left;
  cursor: pointer;
  transition: border-color 0.12s, color 0.12s, background 0.12s;
  border-radius: 2px;
}

.response-btn:hover,
.response-btn.selected {
  border-color: var(--gold);
  color: var(--gold);
  background: var(--gold-dim);
}

.results-title {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 400;
  margin-bottom: 2rem;
}

.chart-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 1.5rem;
}

.actor-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  margin-bottom: 0.5rem;
}

.actor-groups {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 1.25rem;
}

.actor-group {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 7px;
}

.actor-group-label {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  flex-basis: 100%;
  margin-bottom: 2px;
}

.actor-label {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-right: 4px;
}

.actor-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}

.actor-btn-wrap {
  display: flex;
  align-items: center;
  gap: 3px;
}

.actor-info-btn,
.actor-del-btn {
  background: none;
  border: none;
  color: var(--text3);
  font-size: 13px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
  transition: color 0.15s;
}

.actor-info-btn {
  font-family: Georgia, serif;
  font-style: italic;
  font-weight: 600;
}

.actor-info-btn:hover {
  color: var(--gold);
}

.actor-del-btn {
  font-size: 15px;
}

.actor-del-btn:hover {
  color: #c0392b;
}

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 2rem;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
}

.legend-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}

.legend-name {
  font-size: 12px;
  color: var(--text2);
}

.score-bars {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 2.5rem;
}

.score-row {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.score-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
}

.score-name {
  font-size: 13px;
}

.score-val {
  font-size: 12px;
  color: var(--text3);
}

.score-track {
  height: 5px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 5px;
}

.score-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 2px;
  transition: width 0.5s ease;
}

.score-ends {
  display: flex;
  justify-content: space-between;
  gap: 12px;
}

.score-end {
  font-size: 11px;
  color: var(--text3);
}

.actor-bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.actor-bar-name {
  font-size: 11px;
  color: var(--text2);
  width: 80px;
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.actor-bar-track {
  flex: 1;
  height: 4px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}

.actor-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s ease;
}

.actor-bar-val {
  font-size: 11px;
  color: var(--text3);
  width: 28px;
  text-align: right;
  flex-shrink: 0;
}

.divider {
  border: none;
  border-top: 0.5px solid var(--border);
  margin: 2rem 0;
}

.footer-note {
  font-size: 13px;
  color: var(--text3);
  line-height: 1.65;
  margin-bottom: 1.5rem;
}

.footer-note a {
  color: var(--gold);
  text-decoration: none;
}

.footer-note a:hover {
  text-decoration: underline;
}

/* Configuration panel */
.config-section {
  margin-bottom: 1.25rem;
}

.config-heading {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 0.6rem;
}

.config-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.config-btn {
  font-size: 12px;
  padding: 5px 12px;
  border: 0.5px solid var(--border2);
  color: var(--text2);
  background: none;
  cursor: pointer;
  font-family: inherit;
  border-radius: 2px;
}

.config-btn.active {
  border-color: var(--gold);
  color: var(--gold);
  background: var(--gold-dim);
}

.config-file-label {
  font-size: 12px;
  padding: 5px 12px;
  border: 0.5px solid var(--border2);
  color: var(--text2);
  cursor: pointer;
  font-family: inherit;
  border-radius: 2px;
  display: inline-block;
}

.config-file-input {
  display: none;
}

.config-note {
  font-size: 11px;
  color: var(--text3);
  margin-top: 0.5rem;
}

.axis-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.axis-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 10px;
  border: 0.5px solid var(--border);
  border-radius: 2px;
  cursor: grab;
  background: var(--bg3);
  user-select: none;
}

.axis-item.dragging {
  opacity: 0.4;
}

.axis-grip {
  color: var(--text3);
  font-size: 14px;
  line-height: 1;
}

.axis-name {
  font-size: 13px;
  color: var(--text2);
}

.axis-position {
  font-size: 11px;
  color: var(--text3);
  margin-left: auto;
}

.axis-invert {
  font-size: 13px;
  color: var(--text3);
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 3px;
  line-height: 1;
  transition: color 0.15s, background 0.15s;
}

.axis-invert:hover {
  color: var(--text);
  background: rgba(255,255,255,0.06);
}

.axis-invert.active {
  color: var(--gold);
}

[data-theme="light"] {
  --bg: #f5f3ef;
  --bg3: #e8e4da;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.15);
  --text: #1a1a1a;
  --text2: #5a5650;
  --text3: #6a665e;
  --gold: #8b6914;
  --gold-dim: rgba(139,105,20,0.12);
  --chart-grid: rgba(0,0,0,0.07);
  --chart-axis: rgba(0,0,0,0.1);
  --chart-label: rgba(26,26,26,0.55);
}

.site-footer {
  text-align: center;
  padding: 1.5rem 1rem 2rem;
  font-size: 12px;
  color: var(--text3);
  line-height: 1.6;
}

.footer-link {
  color: var(--text3);
  text-decoration: none;
  transition: color 0.15s;
}

.footer-link:hover {
  color: var(--gold);
  text-decoration: underline;
}

.footer-sep {
  margin: 0 6px;
  opacity: 0.5;
}

.footer-ver {
  font-variant-numeric: tabular-nums;
}

.skip-link {
  position: absolute;
  top: -40px;
  left: 0;
  background: var(--bg);
  color: var(--text);
  padding: 8px 16px;
  z-index: 100;
  transition: top 0.2s;
  border: 1px solid var(--border2);
  font-size: 13px;
  text-decoration: none;
}
.skip-link:focus {
  top: 0;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

[tabindex="-1"]:focus {
  outline: none;
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.65);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 2rem 1rem;
  z-index: 200;
  overflow-y: auto;
}

.modal-content {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 4px;
  max-width: 520px;
  width: 100%;
  padding: 1.5rem;
  position: relative;
}

.modal-close {
  position: absolute;
  top: 10px;
  right: 12px;
  background: none;
  border: none;
  color: var(--text3);
  font-size: 22px;
  line-height: 1;
  cursor: pointer;
  padding: 0;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.15s;
}

.modal-close:hover {
  color: var(--text);
}

.modal-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1rem;
}

.modal-color {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
}

.modal-title {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 400;
  margin: 0;
}

.modal-category {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.modal-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 1.25rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--border);
}

.modal-axes {
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}

.modal-axis-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 0.5rem;
}

.modal-axis-name {
  font-size: 14px;
  font-weight: 500;
}

.modal-axis-score {
  font-size: 14px;
  font-weight: 600;
  color: var(--gold);
  min-width: 32px;
  text-align: center;
}

.confidence-badge {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 2px 8px;
  border-radius: 2px;
  border: 1px solid;
}

.confidence-high {
  color: #5a9e3f;
  border-color: rgba(90, 158, 63, 0.4);
  background: rgba(90, 158, 63, 0.08);
}

.confidence-medium {
  color: #c8a84b;
  border-color: rgba(200, 168, 75, 0.4);
  background: rgba(200, 168, 75, 0.08);
}

.confidence-low {
  color: #c0392b;
  border-color: rgba(192, 57, 43, 0.4);
  background: rgba(192, 57, 43, 0.08);
}

.modal-rationale {
  font-size: 13px;
  line-height: 1.6;
  color: var(--text2);
  margin-bottom: 0.75rem;
}

.modal-sources-heading {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text3);
  margin-bottom: 0.5rem;
}

.modal-no-sources {
  font-size: 12px;
  color: var(--text3);
  font-style: italic;
}

.modal-source {
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 10px 12px;
  margin-bottom: 8px;
}

.source-header {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.source-type {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text3);
  border: 1px solid var(--border2);
  padding: 1px 6px;
  border-radius: 2px;
}

.source-link {
  font-size: 12px;
  color: var(--gold);
  text-decoration: none;
}

.source-link:hover {
  text-decoration: underline;
}

.source-date {
  font-size: 11px;
  color: var(--text3);
  margin-left: auto;
}

.source-quote {
  font-size: 12px;
  line-height: 1.5;
  color: var(--text2);
  border-left: 2px solid var(--border2);
  padding-left: 10px;
  margin: 6px 0;
  font-style: italic;
}

.source-cite {
  font-size: 11px;
  color: var(--text3);
  display: block;
  margin-top: 4px;
}

/* Merch preview (results) */
.merch-preview {
  margin-top: 1.5rem;
  padding-top: 1.25rem;
  border-top: 1px solid var(--border2);
}

.merch-badge {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--gold);
  border: 1px solid var(--gold);
  padding: 2px 8px;
  border-radius: 2px;
  margin-bottom: 0.5rem;
}

.merch-heading {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 0.75rem;
  color: var(--text2);
}

.merch-mockup-wrap {
  position: relative;
  max-width: 280px;
  margin: 0 auto 0.75rem;
}

.merch-mockup-frame {
  position: relative;
  aspect-ratio: 4 / 5;
  overflow: hidden;
  border-radius: 4px;
}

.merch-garment-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.merch-chart-overlay {
  position: absolute;
  left: 50%;
  top: 42%;
  transform: translate(-50%, -50%);
  width: 52%;
  aspect-ratio: 1;
  pointer-events: none;
}

.merch-radar-svg {
  width: 100%;
  height: 100%;
  display: block;
}

.merch-carousel-prev,
.merch-carousel-next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0, 0, 0, 0.35);
  border: none;
  color: #fff;
  width: 28px;
  height: 36px;
  font-size: 20px;
  cursor: pointer;
  border-radius: 2px;
  z-index: 2;
}

.merch-carousel-prev {
  left: 4px;
}

.merch-carousel-next {
  right: 4px;
}

.merch-carousel-prev:disabled,
.merch-carousel-next:disabled {
  opacity: 0.3;
  cursor: default;
}

.merch-carousel-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 0.75rem;
}

.merch-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  border: 1px solid var(--border2);
  background: transparent;
  padding: 0;

const AXIS_KEYS = {
  Cultural: 'c',
  Economic: 'e',
  Military: 'm',
  Sovereignty: 's',
  Governance: 'l',
  Class: 'a'
};

const KEY_TO_AXIS = Object.fromEntries(
  Object.entries(AXIS_KEYS).map(([k, v]) => [v, k])
);
function encodeHash(scores, orientation, axesOrder, invertedAxes) {
  const scoreParts = axesOrder.map(ax => `${AXIS_KEYS[ax]}=${scores[ax].toFixed(1)}`);
  const orderCode = axesOrder.map(ax => AXIS_KEYS[ax]).join('');
  const invertCode = (invertedAxes && invertedAxes.size > 0)
    ? axesOrder.filter(ax => invertedAxes.has(ax)).map(ax => AXIS_KEYS[ax]).join('')
    : '';
  let hash = `#v2;${scoreParts.join(',')};o=${orientation};x=${orderCode}`;
  if (invertCode) hash += `;i=${invertCode}`;
  return hash;
}
function decodeHash(hash) {
  if (!hash || hash.length < 2) return null;
  const str = hash.startsWith('#') ? hash.slice(1) : hash;
  const parts = str.split(';');
  const urlVersion = parts[0];
  if (urlVersion !== 'v1' && urlVersion !== 'v2') return null;

  const scores = {};
  let orientation = 'flat';
  let axesOrder = null;
  let invertedAxes = [];

  for (let i = 1; i < parts.length; i++) {
    const part = parts[i];
    if (!part) continue;
    if (part.startsWith('o=')) {
      orientation = part.slice(2);
    } else if (part.startsWith('x=')) {
      axesOrder = part.slice(2).split('').map(k => KEY_TO_AXIS[k]).filter(Boolean);
    } else if (part.startsWith('i=')) {
      invertedAxes = part.slice(2).split('').map(k => KEY_TO_AXIS[k]).filter(Boolean);
    } else if (part.includes('=')) {
      const pairs = part.split(',');
      pairs.forEach(pair => {
        const [pk, pv] = pair.split('=');
        const axis = KEY_TO_AXIS[pk];
        if (axis) scores[axis] = parseFloat(pv);
      });
    }
  }

  if (Object.keys(scores).length === 0) return null;

  // v1 URLs store Governance scores computed with inverted questions (low=autonomy, high=hierarchy).
  // v2 URLs store Governance scores with corrected polarity (low=hierarchy, high=autonomy).
  if (urlVersion === 'v1' && scores.Governance !== undefined) {
    scores.Governance = parseFloat((10 - scores.Governance).toFixed(1));
  }

  return { scores, orientation, axesOrder, invertedAxes };
}
function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text);
  }
  return new Promise((resolve) => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
    } catch (_) {}
    document.body.removeChild(ta);
    resolve();
  });
}

function computeScores(answers) {
  const scores = {};

    const axisQuestions = QUESTIONS
      .map((q, i) => ({ ...q, index: i }))
      .filter(q => q.axis === axis);
    let total = 0;
    for (const q of axisQuestions) {
      const v = answers[q.index] !== undefined ? answers[q.index] : 2; // default to neutral

    scores[axis] = parseFloat(((total / 16) * 10).toFixed(1));
  }
  return scores;

const NS = 'http://www.w3.org/2000/svg';

/** Outermost grid ring (score units). */
const GRID_MAX = 10;
/** Spacing between grid rings; axes extend half a segment beyond the last zone. */
const GRID_STEP = 2;
const AXIS_OUTER_SCORE = GRID_MAX + GRID_STEP / 2;
const LABEL_PAD_PX = 26;

function createSVGElement(tag, attrs = {}) {
  const el = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function startAngleForOrientation(orientation) {
  if (orientation === 'spatial') return 120;
  if (orientation === 'pointy') return -90;
  return -60;
}

function axisPoint(cx, cy, maxR, index, value, orientation) {
  const start = startAngleForOrientation(orientation);
  const angle = (index * 60 + start) * (Math.PI / 180);
  const dist = (value / GRID_MAX) * maxR;
  return [cx + dist * Math.cos(angle), cy + dist * Math.sin(angle)];
}

function axisPointRadius(cx, cy, index, radius, orientation) {
  const start = startAngleForOrientation(orientation);
  const angle = (index * 60 + start) * (Math.PI / 180);
  return [cx + radius * Math.cos(angle), cy + radius * Math.sin(angle)];
}

function polygonPoints(cx, cy, maxR, scores, axes, orientation) {
  return axes.map((ax, i) => {
    const [x, y] = axisPoint(cx, cy, maxR, i, scores[ax] || 0, orientation);
    return `${x.toFixed(2)},${y.toFixed(2)}`;
  }).join(' ');
}
function drawRadar(svg, {
  scores,
  axes,
  orientation = 'flat',
  actors = [],
  uploadedMap = null,
  showUser = true,
  userColor = '#c8a84b',
  uploadedColor = '#b478dc',
  invertedAxes = new Set(),
  register = 'primary',
  labelMode = 'trigram',
  labelMerch = false
}) {
  svg.innerHTML = '';
  const cx = 160, cy = 160, maxR = 108;

  function displayScore(ax, val) {
    return invertedAxes && invertedAxes.has(ax) ? 10 - val : val;
  }

  function displayScores(source) {
    const out = {};
    for (const ax of axes) out[ax] = displayScore(ax, source[ax] || 0);
    return out;
  }

  const axisOuterR = (AXIS_OUTER_SCORE / GRID_MAX) * maxR;

  // Grid polygons at levels 2, 4, 6, 8, 10
  for (const level of [2, 4, 6, 8, GRID_MAX]) {
    const gridScores = Object.fromEntries(axes.map(a => [a, level]));
    svg.appendChild(createSVGElement('polygon', {
      points: polygonPoints(cx, cy, maxR, gridScores, axes, orientation),
      fill: 'none',
      stroke: 'var(--chart-grid)',
      'stroke-width': '1'
    }));
  }

  // Axis lines — extend ½ grid segment beyond outermost zone
  axes.forEach((_, i) => {
    const [x, y] = axisPointRadius(cx, cy, i, axisOuterR, orientation);
    svg.appendChild(createSVGElement('line', {
      x1: cx, y1: cy, x2: x, y2: y,
      stroke: 'var(--chart-axis)', 'stroke-width': '1'
    }));
  });

  // User profile (drawn first so actors overlay it)
  if (showUser) {
    const disp = displayScores(scores);
    svg.appendChild(createSVGElement('polygon', {
      points: polygonPoints(cx, cy, maxR, disp, axes, orientation),
      fill: userColor + '1e',
      stroke: userColor,
      'stroke-width': '2.5'
    }));
    axes.forEach((ax, i) => {
      const [x, y] = axisPoint(cx, cy, maxR, i, disp[ax], orientation);
      svg.appendChild(createSVGElement('circle', { cx: x, cy: y, r: '4', fill: userColor }));
    });
  }

  // Uploaded map overlay
  if (uploadedMap) {
    const disp = displayScores(uploadedMap.scores);
    svg.appendChild(createSVGElement('polygon', {
      points: polygonPoints(cx, cy, maxR, disp, axes, orientation),
      fill: 'rgba(180,120,220,0.12)',
      stroke: uploadedColor,
      'stroke-width': '2',
      'stroke-dasharray': '6,3'
    }));
    axes.forEach((ax, i) => {
      const [x, y] = axisPoint(cx, cy, maxR, i, disp[ax], orientation);
      svg.appendChild(createSVGElement('circle', { cx: x, cy: y, r: '3.5', fill: uploadedColor }));
    });
  }

  // Actor overlays (drawn last so they sit on top)
  for (const actor of actors) {
    const effectiveScores = getEffectiveScores(actor, register);
    svg.appendChild(createSVGElement('polygon', {
      points: polygonPoints(cx, cy, maxR, displayScores(effectiveScores), axes, orientation),
      fill: actor.color + '18',
      stroke: actor.color + '80',
      'stroke-width': '1.5'
    }));
  }

  // Axis labels (trigram on rim; full names in score bars / quiz)
  axes.forEach((ax, i) => {
    const [lx, ly] = axisPointRadius(cx, cy, i, axisOuterR + LABEL_PAD_PX, orientation);
    const fullName = t('axis.' + ax);
    const spokeText = labelMode === 'full' ? fullName : getAxisTrigram(ax);
    const trigramFontSize = labelMerch ? '20' : '12';
    const labelEl = createSVGElement('text', {
      x: lx.toFixed(2), y: ly.toFixed(2),
      'text-anchor': 'middle', 'dominant-baseline': 'middle',
      'font-size': labelMode === 'full' ? (labelMerch ? '14' : '11') : trigramFontSize,
      'font-weight': labelMode === 'full' ? '400' : '600',
      'letter-spacing': labelMode === 'full' ? '0' : (labelMerch ? '0.08em' : '0.12em'),
      'font-family': '-apple-system,BlinkMacSystemFont,sans-serif',
      fill: 'var(--chart-label)',
      class: 'chart-spoke-label'
    });
    labelEl.textContent = spokeText;
    labelEl.setAttribute('aria-label', fullName);
    const titleEl = createSVGElement('title');
    titleEl.textContent = fullName;
    labelEl.appendChild(titleEl);
    svg.appendChild(labelEl);
  });
}

function initMerchCarousel(container, { garment, garmentColor, onGarmentChange, onColorChange }) {
  let index = GARMENTS.findIndex(g => g.id === garment);
  if (index < 0) index = 0;

  const frameEl = container.querySelector('.merch-mockup-frame');
  const imgEl = container.querySelector('.merch-garment-img');
  const dotsEl = container.querySelector('.merch-carousel-dots');
  const prevBtn = container.querySelector('.merch-carousel-prev');
  const nextBtn = container.querySelector('.merch-carousel-next');
  const ctaEl = container.querySelector('.merch-buy-cta');
  const colorWhite = container.querySelector('[data-merch-color="white"]');
  const colorBlack = container.querySelector('[data-merch-color="black"]');

  function currentGarment() {
    return GARMENTS[index];
  }

  function updateUI() {
    const g = currentGarment();
    if (imgEl) {
      imgEl.src = garmentImagePath(g.id, garmentColor);
      frameEl?.setAttribute('data-garment', g.id);
      frameEl?.setAttribute('data-color', garmentColor);
    }
    if (dotsEl) {
      dotsEl.querySelectorAll('.merch-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === index);
        dot.setAttribute('aria-selected', i === index ? 'true' : 'false');
      });
    }
    if (ctaEl) ctaEl.textContent = buyButtonLabel(g.id);
    if (prevBtn) prevBtn.disabled = index === 0;
    if (nextBtn) nextBtn.disabled = index === GARMENTS.length - 1;
    colorWhite?.classList.toggle('active', garmentColor === 'white');
    colorBlack?.classList.toggle('active', garmentColor === 'black');
    onGarmentChange?.(g.id);
  }

  function setIndex(i) {
    index = Math.max(0, Math.min(GARMENTS.length - 1, i));
    updateUI();
  }

  prevBtn?.addEventListener('click', () => setIndex(index - 1));
  nextBtn?.addEventListener('click', () => setIndex(index + 1));

  dotsEl?.querySelectorAll('.merch-dot').forEach((dot, i) => {
    dot.addEventListener('click', () => setIndex(i));
  });

  colorWhite?.addEventListener('click', () => {
    garmentColor = 'white';
    onColorChange?.('white', 'light');
    updateUI();
  });
  colorBlack?.addEventListener('click', () => {
    garmentColor = 'black';
    onColorChange?.('black', 'dark');
    updateUI();
  });

  container.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') setIndex(index - 1);
    if (e.key === 'ArrowRight') setIndex(index + 1);
  });

  updateUI();
  return {
    getGarment: () => currentGarment().id,
    getGarmentColor: () => garmentColor,
    setGarmentColor: (c) => {
      garmentColor = c;
      updateUI();
    }
  };
}

        <div class="responses" id="responses" role="radiogroup" aria-label="${t('response.stronglyAgree')} – ${t('response.stronglyDisagree')}"></div>
        <div style="margin-top:1.25rem;height:32px;display:flex;align-items:center;">
          <button class="btn-text" id="back-btn" style="visibility:${canGoBack ? 'visible' : 'hidden'}">${t('quiz.back')}</button>
        </div>
      </div>
    </div>
  `;

  const responsesEl = document.getElementById('responses');
  const labels = [
    t('response.stronglyAgree'),
    t('response.agree'),
    t('response.neutral'),
    t('response.disagree'),
    t('response.stronglyDisagree')
  ];
  const buttons = [];
  labels.forEach((label, i) => {
    const btn = document.createElement('button');
    btn.className = 'response-btn';
    btn.setAttribute('role', 'radio');
    btn.setAttribute('aria-checked', 'false');
    btn.setAttribute('tabindex', i === 0 ? '0' : '-1');
    btn.textContent = label;
    btn.addEventListener('click', () => {
      buttons.forEach(b => {
        b.setAttribute('aria-checked', 'false');
        b.setAttribute('tabindex', '-1');
      });
      btn.setAttribute('aria-checked', 'true');
      btn.setAttribute('tabindex', '0');
      onAnswer(4 - i);
    });
    responsesEl.appendChild(btn);
    buttons.push(btn);
  });

  responsesEl.addEventListener('keydown', (e) => {
    const idx = buttons.findIndex(b => b.getAttribute('tabindex') === '0');
    if (idx < 0) return;
    let next = idx;
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
      e.preventDefault();
      next = (idx + 1) % buttons.length;
    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
      e.preventDefault();
      next = (idx - 1 + buttons.length) % buttons.length;
    } else if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      buttons[idx].click();
      return;
    }
    if (next !== idx) {
      buttons[idx].setAttribute('tabindex', '-1');
      buttons[next].setAttribute('tabindex', '0');
      buttons[next].focus();
    }
  });

  if (canGoBack) {
    document.getElementById('back-btn').addEventListener('click', onBack);
  }
}

  // Your map toggle

  const ungrouped = allActors.filter(a => !groupedNames.has(a.name));

  const defaultOrder = groupEntries.map(g => g.name);

  defaultOrder.forEach(name => { if (!order.includes(name)) order.push(name); });

  const orderedEntries = order.map(name => groupEntries.find(g => g.name === name)).filter(Boolean);

  orderedEntries.forEach((entry, index) => {

    upBtn.textContent = '↑';
    upBtn.setAttribute('aria-label', 'Move group up');
    upBtn.disabled = index === 0;
    if (!upBtn.disabled) {
      upBtn.addEventListener('click', () => {
        const newOrder = [...order];
        [newOrder[index - 1], newOrder[index]] = [newOrder[index], newOrder[index - 1]];
        onReorderGroups && onReorderGroups(newOrder);
      });
    }

    const downBtn = document.createElement('button');
    downBtn.textContent = '↓';
    downBtn.setAttribute('aria-label', 'Move group down');
    downBtn.disabled = index === orderedEntries.length - 1;
    if (!downBtn.disabled) {
      downBtn.addEventListener('click', () => {
        const newOrder = [...order];
        [newOrder[index], newOrder[index + 1]] = [newOrder[index + 1], newOrder[index]];
        onReorderGroups && onReorderGroups(newOrder);
      });
    }

    reorder.append(upBtn, downBtn);
    header.append(groupLabel, reorder);

    const groupBtns = document.createElement('div');
    groupBtns.className = 'actor-btns';
    entry.actors.forEach(actor => appendActorButton(actor, groupBtns));

  document.getElementById('btn-restart').addEventListener('click', onRestart);

  if (onDownloadChart) {

  }
  if (onDownloadData) {
    document.getElementById('btn-dl-json').addEventListener('click', () => onDownloadData('json'));
    document.getElementById('btn-dl-xml').addEventListener('click', () => onDownloadData('xml'));
  }
  if (onUpload) {
    document.getElementById('file-upload').addEventListener('change', onUpload);
  }
  if (onClearUpload) {
    const clearBtn = document.getElementById('btn-clear-upload');
    if (clearBtn) clearBtn.addEventListener('click', onClearUpload);
  }
  if (onCopyLink) {
    document.getElementById('btn-copy-link').addEventListener('click', onCopyLink);

  if (onSetTheme) {
    document.getElementById('btn-theme-dark').addEventListener('click', () => onSetTheme('dark'));
    document.getElementById('btn-theme-light').addEventListener('click', () => onSetTheme('light'));
  }
  if (onSetOrientation) {
    document.getElementById('btn-orient-spatial').addEventListener('click', () => onSetOrientation('spatial'));
    document.getElementById('btn-orient-flat').addEventListener('click', () => onSetOrientation('flat'));

  }
  if (onSetRegister) {
    document.getElementById('btn-reg-primary').addEventListener('click', () => onSetRegister('primary'));
    document.getElementById('btn-reg-declared').addEventListener('click', () => onSetRegister('declared'));
    document.getElementById('btn-reg-structural').addEventListener('click', () => onSetRegister('structural'));
  }
  if (onSetLanguage) {
    document.getElementById('lang-select').addEventListener('change', (e) => {
      onSetLanguage(e.target.value);
    });
  }
  if (onAddCustomActor) {
    document.getElementById('btn-add-actor').addEventListener('click', () => {
      const name = document.getElementById('ca-name').value.trim();
      const color = document.getElementById('ca-color').value;
      if (!name) return;
      const actorScores = {};
      AXES.forEach(ax => {
        const val = parseFloat(document.getElementById('ca-' + ax).value);
        actorScores[ax] = isNaN(val) ? 5.0 : Math.max(0, Math.min(10, val));
      });
      onAddCustomActor({ name, color, scores: actorScores });
    });
  }
  if (onReorder) {
    const list = document.getElementById('axis-list');
    axes.forEach((ax, i) => {
      const item = document.createElement('div');
      item.className = 'axis-item';
      item.draggable = true;
      item.dataset.idx = i;
      const isInverted = invertedAxes && invertedAxes.has(ax);
      item.innerHTML = `
        <span class="axis-grip">⠿</span>
        <span class="axis-name">${t('axis.' + ax)}</span>
        ${onToggleInvertAxis ? `<button class="axis-invert ${isInverted ? 'active' : ''}" data-axis="${ax}" title="${t('results.invertPoles')}" draggable="false">⇄</button>` : ''}
        <span class="axis-position">${t('axis.position', { n: i + 1 })}</span>
      `;
      list.appendChild(item);
    });
    let dragSrcIdx = null;
    list.querySelectorAll('.axis-item').forEach(item => {
      item.addEventListener('dragstart', (e) => {
        dragSrcIdx = parseInt(item.dataset.idx);
        item.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      item.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
      });
      item.addEventListener('drop', (e) => {
        e.preventDefault();
        const targetIdx = parseInt(item.dataset.idx);
        if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
        const newOrder = [...axes];
        const moved = newOrder.splice(dragSrcIdx, 1)[0];
        newOrder.splice(targetIdx, 0, moved);
        dragSrcIdx = null;
        onReorder(newOrder);
      });
      item.addEventListener('dragend', () => {
        item.classList.remove('dragging');
      });
    });
    if (onToggleInvertAxis) {
      list.querySelectorAll('.axis-invert').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          onToggleInvertAxis(btn.dataset.axis);
        });
      });
    }
  }
}

function openActorModal(actor) {

  const overlay = document.createElement('div');
  overlay.id = 'actor-modal';

  overlay.setAttribute('role', 'dialog');
  overlay.setAttribute('aria-modal', 'true');
  overlay.setAttribute('aria-label', t('actor.browseData'));

  const meta = actor._actorMeta || {};
  const scoreMeta = actor._scoreMeta || {};

  const sourceTypeLabel = type => t('actor.source.type.' + type) || type;

  const axesHtml = AXES.map(ax => {
    const sm = scoreMeta[ax] || {};
    const confidence = sm.confidence || 'low';
    const rationale = sm.rationale || '';
    const sources = sm.sources || [];
    const score = (actor.scores[ax] ?? 0).toFixed(1);

    const sourcesHtml = sources.length === 0
      ? `<p class="modal-no-sources">${t('actor.noSources')}</p>`
      : sources.map(s => `
        <div class="modal-source">
          <div class="source-header">
            <span class="source-type">${sourceTypeLabel(s.type)}</span>
            <a class="source-link" href="${s.url || '#'}" target="_blank" rel="noopener">${s.title || s.url}</a>
            ${s.date ? `<span class="source-date">${s.date}</span>` : ''}
          </div>
          ${s.relevantText ? `<blockquote class="source-quote">"${s.relevantText}"</blockquote>` : ''}
          ${s.citation ? `<cite class="source-cite">${s.citation}</cite>` : ''}
        </div>
      `).join('');

    return `
      <div class="modal-axis">
        <div class="modal-axis-header">
          <span class="modal-axis-name">${t('axis.' + ax)}</span>
          <span class="modal-axis-score">${score}</span>
          <span class="confidence-badge confidence-${confidence}">${t('actor.confidence.' + confidence)}</span>
        </div>
        ${rationale ? `<p class="modal-rationale">${rationale}</p>` : ''}
        <div class="modal-sources">
          <p class="modal-sources-heading">${t('actor.sources')}</p>
          ${sourcesHtml}
        </div>
      </div>
    `;
  }).join('');

  overlay.innerHTML = `
    <div class="modal-content">
      <button class="modal-close" aria-label="${t('actor.close')}">&times;</button>
      <div class="modal-header">
        <div class="modal-color" style="background:${actor.color}"></div>
        <div>
          <h3 class="modal-title">${t('actor.' + actor.name)}</h3>
          ${meta.category ? `<span class="modal-category">${meta.category}</span>` : ''}
        </div>
      </div>
      ${meta.curator || meta.version || meta.lastUpdated ? `
        <div class="modal-meta">
          ${meta.curator ? `<span>${t('actor.curator')}: ${meta.curator}</span>` : ''}
          ${meta.version ? `<span>${t('actor.version')}: ${meta.version}</span>` : ''}
          ${meta.lastUpdated ? `<span>${t('actor.lastUpdated')}: ${meta.lastUpdated}</span>` : ''}
        </div>
      ` : ''}
      <div class="modal-axes">
        ${axesHtml}
      </div>
    </div>
  `;

  document.body.appendChild(overlay);

  const close = () => overlay.remove();
  overlay.querySelector('.modal-close').addEventListener('click', close);
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) close();
  });
  document.addEventListener('keydown', function escHandler(e) {
    if (e.key === 'Escape') {
      close();
      document.removeEventListener('keydown', escHandler);
    }
  });
  overlay.querySelector('.modal-close').focus();
}


function downloadChart(svgElement, filename = 'my-six-axis-compass.png') {
  const svg = svgElement.cloneNode(true);
  svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(svg);
  const url = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);

  const img = new Image();
  const canvas = document.createElement('canvas');
  canvas.width = 640;
  canvas.height = 640;
  const ctx = canvas.getContext('2d');

  img.onload = () => {
    ctx.drawImage(img, 0, 0, 640, 640);
    const a = document.createElement('a');
    a.download = filename;
    a.href = canvas.toDataURL('image/png');
    a.click();
  };

  img.onerror = () => {
    const a = document.createElement('a');
    a.download = filename.replace('.png', '.svg');
    a.href = url;
    a.click();
  };

  img.src = url;
}
function downloadMapData(scores, format = 'json') {
  const payload = {
    source: 'Six-Axis Political Compass',
    version: '2.2.2',
    generated: new Date().toISOString(),
    axes: scores
  };

  let content, mime, ext;
  if (format === 'json') {
    content = JSON.stringify(payload, null, 2);
    mime = 'application/json';
    ext = 'json';
  } else {
    content = `<?xml version="1.0" encoding="UTF-8"?>\n<compass source="${payload.source}" version="${payload.version}" generated="${payload.generated}">\n` +
      Object.entries(scores).map(([k, v]) => `  <axis name="${k}" score="${v}"/>`).join('\n') +
      '\n</compass>';
    mime = 'application/xml';
    ext = 'xml';
  }

  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.download = `my-six-axis-compass.${ext}`;
  a.href = url;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
function parseUpload(fileContent, fileName) {
  let scores = {};
  let isOld = false;
  let p = null;
  let versionAttr = null;

  if (fileName.endsWith('.json')) {
    p = JSON.parse(fileContent);
    if (!p.axes) throw new Error('No axes field');
    scores = p.axes;
    const oldVersion = p.version && p.version.startsWith('0.0.');
    const oldSource = p.source && p.source.includes('Common Enemy');
    if (oldVersion || oldSource) isOld = true;
  } else if (fileName.endsWith('.xml')) {
    const dom = new DOMParser().parseFromString(fileContent, 'application/xml');
    const axisEls = dom.querySelectorAll('axis');
    if (!axisEls.length) throw new Error('No axis elements');
    axisEls.forEach(el => {
      scores[el.getAttribute('name')] = parseFloat(el.getAttribute('score'));
    });
    versionAttr = dom.documentElement.getAttribute('version');
    const sourceAttr = dom.documentElement.getAttribute('source');
    if ((versionAttr && versionAttr.startsWith('0.0.')) || (sourceAttr && sourceAttr.includes('Common Enemy'))) {
      isOld = true;
    }
  } else {
    throw new Error('Unsupported file format');
  }

  // Backwards compatibility: map old Libertarian/Authoritarian axis to Liberty
  if (scores['Libertarian/Authoritarian'] !== undefined) {
    scores.Liberty = scores['Libertarian/Authoritarian'];
    delete scores['Libertarian/Authoritarian'];
  }

  // Backwards compatibility: invert old Liberty scores from pre-v1.2.0 exports
  // prior to v1.2.0 (old convention: 0=libertarian, 10=authoritarian)
  let invertedAxis = false;
  if (scores.Liberty !== undefined) {
    const needsInvert = isOld || (p && p.version && p.version === '1.1.0') || (versionAttr && versionAttr === '1.1.0');
    if (needsInvert) {
      scores.Liberty = parseFloat((10 - scores.Liberty).toFixed(1));
      invertedAxis = true;
    }
  }

  // Backwards compatibility: map old Liberty axis to Governance
  if (scores.Liberty !== undefined) {
    scores.Governance = scores.Liberty;
    delete scores.Liberty;
  }

  const labelParts = [];
  if (isOld) labelParts.push('earlier version');
  if (invertedAxis) labelParts.push('Liberty score inverted for v1.2.0 convention');
  const label = labelParts.length > 0
    ? 'Uploaded map (' + labelParts.join('; ') + ')'
    : 'Uploaded map';

  return { scores, label };
}


if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

const app = document.getElementById('app');
let quiz;
let selectedActors = new Set();
let orientation = 'spatial';
let axesOrder = [...SPATIAL_AXES];
let showUser = true;
let uploadedMap = null;
let language = 'en';
let theme = 'dark';
let customActors = [];
let invertedAxes = new Set();
let actorGroupOrder = [];
let registerMode = 'primary';
let merchGarment = 'tee';
let merchGarmentColor = 'white';

function loadActorGroupOrder() {
  try {
    const stored = localStorage.getItem('six-axis-compass-actor-group-order');
    if (stored) actorGroupOrder = JSON.parse(stored);
  } catch (_) {}
}

function saveActorGroupOrder() {
  try {
    localStorage.setItem('six-axis-compass-actor-group-order', JSON.stringify(actorGroupOrder));
  } catch (_) {}
}

function loadCustomActors() {
  try {
    const stored = localStorage.getItem('six-axis-compass-custom-actors');
    if (stored) customActors = JSON.parse(stored);
  } catch (_) {}
}

function saveCustomActors() {
  try {
    localStorage.setItem('six-axis-compass-custom-actors', JSON.stringify(customActors));
  } catch (_) {}
}

function loadTheme() {
  try {
    const stored = localStorage.getItem('six-axis-compass-theme');
    if (stored === 'light' || stored === 'dark') theme = stored;
  } catch (_) {}
}

function saveTheme() {
  try {
    localStorage.setItem('six-axis-compass-theme', theme);
  } catch (_) {}
}

function loadInvertedAxes() {
  try {
    const stored = localStorage.getItem('six-axis-compass-inverted-axes');
    if (stored) {
      invertedAxes = new Set(JSON.parse(stored));
    } else {
      invertedAxes = new Set(SPATIAL_DISPLAY_INVERT);
    }
  } catch (_) {
    invertedAxes = new Set(SPATIAL_DISPLAY_INVERT);
  }
}

function saveInvertedAxes() {
  try {
    localStorage.setItem('six-axis-compass-inverted-axes', JSON.stringify([...invertedAxes]));
  } catch (_) {}
}

function loadRegisterMode() {
  try {
    const stored = localStorage.getItem('six-axis-compass-register-mode');
    if (stored && ['primary', 'declared', 'structural'].includes(stored)) registerMode = stored;
  } catch (_) {}
}

function saveRegisterMode() {
  try {
    localStorage.setItem('six-axis-compass-register-mode', registerMode);
  } catch (_) {}
}

loadCustomActors();
loadTheme();
loadInvertedAxes();
loadActorGroupOrder();
loadRegisterMode();
document.documentElement.setAttribute('data-theme', theme);

function announce(message) {
  const el = document.getElementById('announcer');
  if (el) el.textContent = message;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) {
    el.classList.add('active');
    el.focus();
    const label = el.getAttribute('aria-label');
    if (label) announce(label);
  }
  window.scrollTo(0, 0);
}

function startQuiz() {
  quiz = createQuiz();
  renderQuizScreen();
}

function renderQuizScreen() {
  renderQuiz(app, {
    question: quiz.question,
    progress: quiz.progress,
    stepLabel: quiz.stepLabel,
    axis: quiz.question.axis,
    onAnswer: handleAnswer,
    onBack: goBack,
    canGoBack: quiz.current > 0
  });
}

function handleAnswer(value) {
  const complete = quiz.answer(value);
  if (complete) {
    showResults();
  } else {
    renderQuizScreen();
  }
}

function goBack() {
  quiz.back();
  renderQuizScreen();
}

function loadFromHash() {
  const decoded = decodeHash(window.location.hash);
  if (!decoded) return false;
  orientation = decoded.orientation;
  if (decoded.axesOrder && decoded.axesOrder.length === 6) {
    axesOrder = decoded.axesOrder;
  }
  if (decoded.invertedAxes && decoded.invertedAxes.length > 0) {
    invertedAxes = new Set(decoded.invertedAxes);
  }
  quiz = {
    getScores: () => decoded.scores,
    getAnswers: () => ({}),
    current: 24,
    total: 24,
    isComplete: true
  };
  showResults();
  return true;
}

function showResults() {
  const scores = quiz.getScores();
  window.location.hash = encodeHash(scores, orientation, axesOrder, invertedAxes);
  renderResults(app, {
    scores,
    axes: axesOrder,
    orientation,
    showUser,
    selectedActors,
    uploadedMap,
    invertedAxes,
    onToggleActor: name => {
      selectedActors.has(name) ? selectedActors.delete(name) : selectedActors.add(name);
      showResults();
    },
    onRestart: () => {
      orientation = 'spatial';
      axesOrder = [...SPATIAL_AXES];
      showUser = true;
      uploadedMap = null;
      selectedActors.clear();
      invertedAxes = new Set(SPATIAL_DISPLAY_INVERT);
      actorGroupOrder = [];
      saveInvertedAxes();
      saveActorGroupOrder();
      window.location.hash = '';
      renderIntro(app, { onStart: startQuiz, onUpload: handleIntroUpload });
    },
    onDownloadChart: () => {
      const svg = document.getElementById('radar');
      if (svg) downloadChart(svg);
    },
    onDownloadData: (format) => {
      downloadMapData(scores, format);
    },
    onUpload: (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (evt) => {
        try {
          uploadedMap = parseUpload(evt.target.result, file.name);
          showResults();
        } catch (err) {
          alert(t('error.upload') + err.message);
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    },
    onClearUpload: () => {
      uploadedMap = null;
      showResults();
    },
    onToggleUser: () => {
      showUser = !showUser;
      showResults();
    },
    onSetOrientation: (o) => {
      orientation = o;
      showResults();
    },
    onReorder: (newOrder) => {
      axesOrder = newOrder;
      showResults();
    },
    onSetLanguage: (lang) => {
      language = lang;
      setLanguage(lang);
      showResults();
    },
    onCopyLink: () => {
      copyToClipboard(window.location.href);
    },
    register: registerMode,
    customActors,
    onAddCustomActor: (actor) => {
      if (customActors.some(c => c.name === actor.name)) return;
      customActors.push(actor);
      selectedActors.add(actor.name);
      saveCustomActors();
      showResults();
    },
    onDeleteCustomActor: (name) => {
      customActors = customActors.filter(c => c.name !== name);
      selectedActors.delete(name);
      saveCustomActors();
      showResults();
    },
    onToggleInvertAxis: (ax) => {
      invertedAxes.has(ax) ? invertedAxes.delete(ax) : invertedAxes.add(ax);
      saveInvertedAxes();
      showResults();
    },
    onReorderGroups: (newOrder) => {
      actorGroupOrder = newOrder;
      saveActorGroupOrder();
      showResults();
    },
    groupOrder: actorGroupOrder,
    language,
    theme,
    onSetTheme: (t) => {
      theme = t;
      saveTheme();
      document.documentElement.setAttribute('data-theme', theme);
      showResults();
    },
    onSetRegister: (r) => {
      registerMode = r;
      saveRegisterMode();
      showResults();
    },
    merchGarment,
    merchGarmentColor,
    onBuyMerch: ({ garment, garmentColor, chartTheme }) => {
      const scores = quiz.getScores();
      const userMapColor = theme === 'light' ? '#000000' : '#ffffff';
      const draft = buildDraftFromResults({
        scores,
        orientation,
        axesOrder,
        invertedAxes,
        selectedActorNames: [...selectedActors],
        customActors,
        uploadedMap,
        showUser,
        register: registerMode,
        garment,
        garmentColor,
        chartTheme,
        userMapColor
      });
      saveMerchDraft(draft);
      const hash = encodeMerchHash({
        scores,
        orientation,
        axesOrder,
        invertedAxes,
        actorSlugs: draft.actorSlugs,
        garment,
        garmentColor,
        chartTheme,
        register: registerMode,
        userMapColor
      });
      window.location.href = 'shop.html' + hash;
    }
  });
}

function handleIntroUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      const result = parseUpload(evt.target.result, file.name);
      quiz = {
        getScores: () => result.scores,
        getAnswers: () => ({}),
        current: 24,
        total: 24,
        isComplete: true
      };
      showResults();
    } catch (err) {
      alert(t('error.upload') + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function showShopNeedsResultsBanner() {
  if (new URLSearchParams(window.location.search).get('shop') !== 'needs-results') return;
  const banner = document.createElement('p');
  banner.className = 'shop-intro-banner';
  banner.setAttribute('role', 'status');
  banner.textContent = t('shop.needsResults');
  app.prepend(banner);
}

if (!loadFromHash()) {
  renderIntro(app, { onStart: startQuiz, onUpload: handleIntroUpload });
  showShopNeedsResultsBanner();
} else {
  showShopNeedsResultsBanner();
}

</script>
