<script>
const THEME_KEY = 'six-axis-compass-theme';
function getStoredTheme() {
  try {
    const stored = localStorage.getItem(THEME_KEY);
    if (stored === 'light' || stored === 'dark') return stored;
  } catch (_) {}
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
    return 'light';
  }
  return 'dark';
}
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  try {
    localStorage.setItem(THEME_KEY, theme);
  } catch (_) {}
  updateThemeToggleIcon(theme);
}

function updateThemeToggleIcon(theme) {
  document.querySelectorAll('[data-theme-toggle]').forEach(btn => {
    btn.setAttribute('aria-label', theme === 'dark' ? 'Switch to light theme' : 'Switch to dark theme');
    btn.textContent = theme === 'dark' ? '☀' : '☾';
  });
}

function navLinkClass(page, current) {
  return `site-nav__link${page === current ? ' is-active' : ''}`;
}

function mobileNavLinkClass(page, current) {
  return `mobile-nav__link${page === current ? ' is-active' : ''}`;
}

const LOGO_SVG = `<svg class="site-brand__icon" viewBox="0 0 36 36" aria-hidden="true"><polygon points="18,2 34,18 18,34 2,18" stroke-linejoin="round"/></svg>`;
function renderSiteHeader(currentPage = 'compass') {
  const existing = document.getElementById('site-header');
  if (existing) existing.remove();

  const header = document.createElement('header');
  header.id = 'site-header';
  header.className = 'site-header';
  header.innerHTML = `
    <div class="site-header__inner">
      <a class="site-brand" href="index.html">
        ${LOGO_SVG}
        <span class="site-brand__text">Six-Axis Compass</span>
      </a>
      <nav class="site-nav" aria-label="Main">
        <a class="${navLinkClass('compass', currentPage)}" href="index.html">Compass</a>
        <a class="${navLinkClass('shop', currentPage)}" href="shop.html">Shop</a>
        <a class="${navLinkClass('dataset', currentPage)}" href="data.html">Dataset</a>
      </nav>
      <div class="site-header__actions">
        <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle theme">☀</button>
        <button type="button" class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="mobile-nav" aria-label="Open menu">
          <span class="nav-toggle__bar"></span>
          <span class="nav-toggle__bar"></span>
          <span class="nav-toggle__bar"></span>
        </button>
      </div>
    </div>
    <nav class="mobile-nav" id="mobile-nav" aria-label="Mobile">
      <a class="${mobileNavLinkClass('compass', currentPage)}" href="index.html">Compass</a>
      <a class="${mobileNavLinkClass('shop', currentPage)}" href="shop.html">Shop</a>
      <a class="${mobileNavLinkClass('dataset', currentPage)}" href="data.html">Dataset</a>
    </nav>
  `;

  const skip = document.querySelector('.skip-link');
  if (skip) {
    skip.after(header);
  } else {
    document.body.prepend(header);
  }

  const theme = getStoredTheme();
  applyTheme(theme);

  header.querySelector('[data-theme-toggle]').addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    document.dispatchEvent(new CustomEvent('themechange', { detail: { theme: next } }));
  });

  const toggle = header.querySelector('#nav-toggle');
  const mobileNav = header.querySelector('#mobile-nav');
  toggle.addEventListener('click', () => {
    const open = toggle.getAttribute('aria-expanded') === 'true';
    toggle.setAttribute('aria-expanded', open ? 'false' : 'true');
    toggle.setAttribute('aria-label', open ? 'Open menu' : 'Close menu');
    mobileNav.classList.toggle('is-open', !open);
  });

  mobileNav.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      toggle.setAttribute('aria-expanded', 'false');
      toggle.setAttribute('aria-label', 'Open menu');
      mobileNav.classList.remove('is-open');
    });
  });
}
function renderSiteFooter(version) {
  const footers = document.querySelectorAll('.site-footer');
  footers.forEach(f => f.remove());

  const footer = document.createElement('footer');
  footer.className = 'site-footer';
  footer.innerHTML = `
    <div class="site-footer__inner">
      <span class="footer-copy">© 2026 Ruari Mears</span>
      <span class="footer-sep">·</span>
      <a class="footer-link" href="https://github.com/earlution/6-axis-compass/blob/main/LICENCE" target="_blank" rel="noopener">MIT Licence</a>
      <span class="footer-sep">·</span>
      <a class="footer-link" href="data.html">Dataset</a>
      <span class="footer-sep">·</span>
      <span class="footer-ver">v${version || '1.0.0'}</span>
    </div>
  `;
  document.body.appendChild(footer);
}
function initResponsiveAccordions(root = document) {
  const mq = window.matchMedia('(min-width: 768px)');
  function sync() {
    root.querySelectorAll('.config-accordion').forEach(el => {
      if (mq.matches) {
        el.setAttribute('open', '');
      }
    });
  }
  sync();
  if (mq.addEventListener) mq.addEventListener('change', sync);
  else mq.addListener(sync);
}
function initChrome({ page = 'compass', version = '1.0.0' } = {}) {
  const app = document.getElementById('app');
  if (app && !app.classList.contains('page-main')) {
    app.classList.add('page-main');
  }
  renderSiteHeader(page);
  renderSiteFooter(version);
}

function groupActors(actors) {
  const groups = [];
  const grouped = new Set();
  const orderMap = new Map(groupOrder.map((n, i) => [n, i]));

  for (const [groupName, actorNames] of Object.entries(ACTOR_GROUPS || {})) {
    const members = actors.filter(a => actorNames.includes(a.name));
    if (members.length > 0) {
      groups.push({ name: groupName, actors: members });

  const other = actors.filter(a => !grouped.has(a.name));
  if (other.length > 0) {
    groups.push({ name: 'Other', actors: other });

  groups.sort((a, b) => {
    const ai = orderMap.get(a.name);

    if (ai !== undefined && bi !== undefined) return ai - bi;
    if (ai !== undefined) return -1;
    if (bi !== undefined) return 1;
    return 0;
  });

      if (declared !== undefined && structural !== undefined) {
        const deltaStr = delta >= 0 ? '+' + delta.toFixed(1) : delta.toFixed(1);
        dualRegHtml = `<p class="rationale" style="margin-top:0.3rem;">Declared: ${declared.toFixed(1)} · Structural: ${structural.toFixed(1)} · Delta: ${deltaStr}${conf ? ` (${(conf.declared * 100).toFixed(0)}% / ${(conf.structural * 100).toFixed(0)}%)` : ''}</p>`;
      }
    }
    return `
      <div class="detail-group">
        <h4>${ax} — ${actor.scores[ax]?.toFixed(1)}</h4>
        <p class="rationale">${rationale}</p>
        ${dualRegHtml}
        <ul class="source-list">${sources}</ul>
      </div>
    `;
  }).join('');

  let dualRegMetaHtml = '';
  if (actor.dualRegister) {
    const dr = actor.dualRegister;
    dualRegMetaHtml = `
      <div class="detail-group">
        <h4>Dual-Register</h4>
        <p>Protocol: ${escapeHtml(dr.protocol || '')}</p>
        <p>Period: ${escapeHtml(dr.period || '')}</p>
        <p>Status: ${escapeHtml(dr.status || '')}</p>
      </div>
    `;
  }

  return `
    <div class="detail-panel">
      <div class="detail-group">
        <h4>Metadata</h4>
        <p>Version: ${escapeHtml(meta.version || '')}</p>
        <p>Last updated: ${date}</p>
        <p>Curator: ${escapeHtml(meta.curator || '')}</p>
        <p><a href="${jsonUrl}" target="_blank" rel="noopener">View raw JSON ↗</a></p>
      </div>
      ${dualRegMetaHtml}
      ${axisDetails}
    </div>
  `;
}

function renderTable(groups) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  groups.forEach((group, groupIndex) => {
    const header = document.createElement('tr');
    header.className = 'group-header';

    const reorder = document.createElement('span');
    reorder.className = 'group-reorder';
    reorder.innerHTML = `
      <button aria-label="Move group up" ${groupIndex === 0 ? 'disabled' : ''}>↑</button>
      <button aria-label="Move group down" ${groupIndex === groups.length - 1 ? 'disabled' : ''}>↓</button>
    `;
    const upBtn = reorder.querySelector('button:first-child');
    const downBtn = reorder.querySelector('button:last-child');

    upBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (groupIndex > 0) {
        const newOrder = groups.map(g => g.name);
        [newOrder[groupIndex], newOrder[groupIndex - 1]] = [newOrder[groupIndex - 1], newOrder[groupIndex]];
        groupOrder = newOrder;
        saveGroupOrder();
        refresh();
      }
    });

    downBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (groupIndex < groups.length - 1) {
        const newOrder = groups.map(g => g.name);
        [newOrder[groupIndex], newOrder[groupIndex + 1]] = [newOrder[groupIndex + 1], newOrder[groupIndex]];
        groupOrder = newOrder;
        saveGroupOrder();
        refresh();
      }
    });

    const label = document.createElement('span');
    label.textContent = `${group.name} `;
    const count = document.createElement('span');
    count.style.cssText = 'color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0;';
    count.textContent = `(${group.actors.length})`;
    label.appendChild(count);

    const td = document.createElement('td');
    td.setAttribute('colspan', '8');
    td.appendChild(label);
    td.appendChild(reorder);
    header.appendChild(td);
    tbody.appendChild(header);

    for (const actor of group.actors) {
      const meta = actor._actorMeta || {};
      const scoreMeta = actor._scoreMeta || {};
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>
          <div class="data-actor-name">
            <span class="color-dot" style="background:${actor.color}"></span>
            ${escapeHtml(actor.name)}
          </div>
        </td>
        <td class="col-category">${escapeHtml(meta.category || '')}</td>
        ${AXES.map(ax => {
          const conf = scoreMeta[ax]?.confidence || 'medium';
          return `<td class="data-score">
            ${actor.scores[ax]?.toFixed(1)}
            <span class="conf conf-${conf}">${conf.replace('-',' ')}</span>
          </td>`;
        }).join('')}
      `;
      tr.addEventListener('click', () => toggleTableDetail(tr, actor));
      tbody.appendChild(tr);
    }
  });
}

function renderCards(groups) {
  const container = document.getElementById('data-cards');
  container.innerHTML = '';

  groups.forEach((group, groupIndex) => {
    const groupEl = document.createElement('div');
    groupEl.className = 'data-card-group';
    groupEl.innerHTML = `<span>${group.name} (${group.actors.length})</span>`;
    container.appendChild(groupEl);

    group.actors.forEach(actor => {
      const meta = actor._actorMeta || {};
      const card = document.createElement('article');
      card.className = 'data-card';
      card.dataset.actor = actor.name;

      const topAxes = AXES.slice(0, 6);
      card.innerHTML = `
        <div class="data-card__header">
          <div class="data-actor-name">
            <span class="color-dot" style="background:${actor.color}"></span>
            ${escapeHtml(actor.name)}
          </div>
          <span class="conf conf-medium">${escapeHtml(meta.category || '')}</span>
        </div>
        <div class="data-card__scores">
          ${topAxes.map(ax => `
            <div class="data-card__score-item">
              <span>${ax.slice(0, 3)}</span>
              <span class="data-card__score-val">${actor.scores[ax]?.toFixed(1)}</span>
            </div>
          `).join('')}
        </div>
        <div class="data-card__detail">${buildDetailHtml(actor)}</div>
      `;

      card.querySelector('.data-card__header').addEventListener('click', () => toggleCardDetail(card));
      container.appendChild(card);
    });
  });
}

function toggleCardDetail(card) {
  if (expandedCard && expandedCard !== card) {
    expandedCard.classList.remove('is-expanded');
  }
  const open = card.classList.toggle('is-expanded');
  expandedCard = open ? card : null;
}

function toggleTableDetail(tr, actor) {
  if (expandedRow && expandedRow !== tr) {
    const existing = expandedRow.nextElementSibling;
    if (existing && existing.classList.contains('detail')) existing.remove();
    expandedRow.classList.remove('expanded');
  }

  const next = tr.nextElementSibling;
  if (next && next.classList.contains('detail')) {
    next.remove();
    tr.classList.remove('expanded');
    expandedRow = null;
    return;
  }

  tr.classList.add('expanded');
  expandedRow = tr;

  const detail = document.createElement('tr');
  detail.className = 'detail';
  detail.innerHTML = `<td colspan="8">${buildDetailHtml(actor)}</td>`;
  tr.after(detail);
}

function render(groups) {
  let totalActors = 0;
  for (const g of groups) totalActors += g.actors.length;

  if (totalActors === 0) {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="8" class="data-empty">No actors match your search.</td></tr>';
    document.getElementById('data-cards').innerHTML = '<p class="data-empty">No actors match your search.</p>';
    document.getElementById('count').textContent = '0 actors';
    return;
  }

  document.getElementById('count').textContent = `${totalActors} actor${totalActors !== 1 ? 's' : ''}`;
  renderTable(groups);
  renderCards(groups);
}

function refresh() {
  expandedRow = null;
  expandedCard = null;
  const q = document.getElementById('search').value;
  const filtered = filterActors(ACTORS, q);
  const sorted = sortActors(filtered, currentSort.col, currentSort.dir);
  render(groupActors(sorted));
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sortActors(actors, col, dir) {
  const sorted = [...actors];
  sorted.sort((a, b) => {
    let av, bv;
    if (col === 'name') { av = a.name; bv = b.name; }
    else if (col === 'category') { av = (a._actorMeta || {}).category || ''; bv = (b._actorMeta || {}).category || ''; }
    else { av = a.scores[col] ?? -1; bv = b.scores[col] ?? -1; }
    if (av < bv) return dir === 'asc' ? -1 : 1;
    if (av > bv) return dir === 'asc' ? 1 : -1;
    return 0;
  });
  return sorted;
}

function filterActors(actors, q) {
  if (!q) return actors;
  const term = q.toLowerCase();
  return actors.filter(a => {
    const meta = a._actorMeta || {};
    const sm = a._scoreMeta || {};
    return a.name.toLowerCase().includes(term)
      || (meta.category || '').toLowerCase().includes(term)
      || Object.values(sm).some(v =>
        (v.rationale || '').toLowerCase().includes(term)
        || (v.sources || []).some(s => (s.title || '').toLowerCase().includes(term))
      );
  });
}

loadGroupOrder();
refresh();

document.querySelectorAll('.data-table th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.sort;
    const dir = currentSort.col === col && currentSort.dir === 'asc' ? 'desc' : 'asc';
    currentSort = { col, dir };
    document.querySelectorAll('.data-table th').forEach(t => t.classList.remove('asc','desc'));
    th.classList.add(dir);
    refresh();
  });
});

document.getElementById('search').addEventListener('input', () => refresh());

initChrome({ page: 'dataset', version: '3.7.0' });

</script>
</body>
</html>
