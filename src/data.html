<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actor Data — Six-Axis Political Compass</title>
<meta name="description" content="Browse the complete dataset of political actor positions across six axes.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
:root {
  --bg: #121212;
  --surface: #1e1e1e;
  --surface-hover: #2a2a2a;
  --border: #333;
  --text: #e0e0e0;
  --text-muted: #888;
  --accent: #c8a84b;
  --accent-dim: #a08030;
  --good: #4a9c5d;
  --warn: #d4a017;
  --bad: #c44;
  --radius: 8px;
  --gap: 1rem;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --mono: 'SF Mono', Monaco, 'Cascadia Code', monospace;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #f5f5f5;
    --surface: #fff;
    --surface-hover: #f0f0f0;
    --border: #ddd;
    --text: #222;
    --text-muted: #666;
    --accent: #8b6914;
    --accent-dim: #6b5010;
  }
}

* { box-sizing: border-box; margin: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  padding: 2rem 1rem;
}

.wrap {
  max-width: 1200px;
  margin: 0 auto;
}

header { margin-bottom: 2rem; }

.brand {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 0.5rem;
}

.brand-icon {
  width: 36px; height: 36px;
  fill: none; stroke: var(--accent); stroke-width: 2;
}

h1 {
  font-size: 1.5rem;
  font-weight: 600;
  letter-spacing: -0.02em;
}

.subtitle {
  color: var(--text-muted);
  font-size: 0.95rem;
}

.controls {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 1.5rem;
}

.search {
  flex: 1;
  min-width: 200px;
  padding: 0.5rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text);
  font-size: 0.95rem;
}

.search:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(200,168,75,0.15);
}

.count {
  color: var(--text-muted);
  font-size: 0.9rem;
}

.table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.92rem;
}

th, td {
  padding: 0.6rem 0.75rem;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

th {
  font-weight: 600;
  color: var(--text-muted);
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}

th:hover { color: var(--accent); }

th .sort {
  display: inline-block;
  width: 0; height: 0;
  margin-left: 0.3rem;
  vertical-align: middle;
  border-left: 4px solid transparent;
  border-right: 4px solid transparent;
  border-bottom: 5px solid var(--text-muted);
  opacity: 0.3;
}

th.asc .sort {
  border-bottom: none;
  border-top: 5px solid var(--accent);
  opacity: 1;
}

th.desc .sort {
  border-bottom: 5px solid var(--accent);
  border-top: none;
  opacity: 1;
}

tr:hover td { background: var(--surface-hover); }

tr.expanded td { background: var(--surface-hover); border-bottom: none; }

tr.detail td {
  padding: 0;
  border-bottom: 1px solid var(--border);
}

.actor-name {
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.color-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.score {
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
}

.conf {
  display: inline-block;
  padding: 0.15rem 0.4rem;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

.conf-high { background: rgba(74,156,93,0.15); color: var(--good); }
.conf-very-high { background: rgba(74,156,93,0.2); color: var(--good); }
.conf-medium { background: rgba(212,160,23,0.15); color: var(--warn); }
.conf-low { background: rgba(204,68,68,0.15); color: var(--bad); }

.detail-panel {
  padding: 1rem 1.25rem;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 1rem;
}

.detail-group h4 {
  font-size: 0.75rem;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 0.4rem;
  letter-spacing: 0.04em;
}

.detail-group p, .detail-group a {
  font-size: 0.85rem;
  color: var(--text);
}

.detail-group a {
  color: var(--accent);
  text-decoration: none;
}

.detail-group a:hover { text-decoration: underline; }

.rationale {
  font-size: 0.85rem;
  color: var(--text-muted);
  line-height: 1.4;
  max-width: 600px;
}

.source-list {
  list-style: none;
  padding: 0;
  margin: 0;
}

.source-list li {
  font-size: 0.82rem;
  margin-bottom: 0.3rem;
  color: var(--text-muted);
}

.source-list a { color: var(--accent-dim); }

.empty {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-muted);
}

footer {
  margin-top: 3rem;
  text-align: center;
  color: var(--text-muted);
  font-size: 0.85rem;
}

footer a {
  color: var(--accent);
  text-decoration: none;
}

@media (max-width: 700px) {
  body { padding: 1rem 0.5rem; }
  th, td { padding: 0.5rem 0.4rem; font-size: 0.85rem; }
  .detail-panel { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 36 36">
        <polygon points="18,2 34,18 18,34 2,18" stroke-linejoin="round"/>
      </svg>
      <h1>Six-Axis Compass — Actor Dataset</h1>
    </div>
    <p class="subtitle">Browse all scored political actors. Every score is traceable to primary sources. Click a row to expand detail.</p>
  </header>

  <div class="controls">
    <input type="text" class="search" id="search" placeholder="Search actors, categories, or sources..." aria-label="Search actors">
    <span class="count" id="count"></span>
  </div>

  <div class="table-wrap">
    <table role="grid" aria-label="Actor dataset">
      <thead>
        <tr>
          <th data-sort="name">Actor <span class="sort"></span></th>
          <th data-sort="category">Category <span class="sort"></span></th>
          <th data-sort="Cultural">Cultural <span class="sort"></span></th>
          <th data-sort="Economic">Economic <span class="sort"></span></th>
          <th data-sort="Military">Military <span class="sort"></span></th>
          <th data-sort="Sovereignty">Sovereignty <span class="sort"></span></th>
          <th data-sort="Governance">Governance <span class="sort"></span></th>
          <th data-sort="Class">Class <span class="sort"></span></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <footer>
    <p>Data version <strong>v{{VERSION}}</strong> · <a href="index.html">Back to the Compass</a> · <a href="https://github.com/earlution/6-axis-compass/tree/main/data/actors" target="_blank" rel="noopener">Browse raw JSON on GitHub</a></p>
  </footer>
</div>

<script>
// ACTOR_DATA will be injected by build.js
const ACTORS = __ACTORS || [];
const AXES = ['Cultural','Economic','Military','Sovereignty','Governance','Class'];

let currentSort = { col: 'name', dir: 'asc' };
let expandedRow = null;

function render(actors) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  if (actors.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty">No actors match your search.</td></tr>';
    document.getElementById('count').textContent = '0 actors';
    return;
  }

  document.getElementById('count').textContent = `${actors.length} actor${actors.length !== 1 ? 's' : ''}`;

  for (const actor of actors) {
    const meta = actor._actorMeta || {};
    const scoreMeta = actor._scoreMeta || {};

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <div class="actor-name">
          <span class="color-dot" style="background:${actor.color}"></span>
          ${escapeHtml(actor.name)}
        </div>
      </td>
      <td>${escapeHtml(meta.category || '')}</td>
      ${AXES.map(ax => {
        const conf = scoreMeta[ax]?.confidence || 'medium';
        return `<td class="score">
          ${actor.scores[ax]?.toFixed(1)}
          <span class="conf conf-${conf}">${conf.replace('-',' ')}</span>
        </td>`;
      }).join('')}
    `;

    tr.addEventListener('click', () => toggleDetail(tr, actor));
    tbody.appendChild(tr);
  }
}

function toggleDetail(tr, actor) {
  const meta = actor._actorMeta || {};
  const scoreMeta = actor._scoreMeta || {};

  if (expandedRow && expandedRow !== tr) {
    const existing = expandedRow.nextElementSibling;
    if (existing && existing.classList.contains('detail')) existing.remove();
    expandedRow.classList.remove('expanded');
  }

  const next = tr.nextElementSibling;
  if (next && next.classList.contains('detail')) {
    next.remove();
    tr.classList.remove('expanded');
    expandedRow = null;
    return;
  }

  tr.classList.add('expanded');
  expandedRow = tr;

  const detail = document.createElement('tr');
  detail.className = 'detail';

  const jsonUrl = `https://github.com/earlution/6-axis-compass/blob/main/data/actors/${meta.slug || ''}.json`;
  const date = meta.lastUpdated ? new Date(meta.lastUpdated).toLocaleDateString('en-GB') : '';

  const axisDetails = AXES.map(ax => {
    const sm = scoreMeta[ax] || {};
    const rationale = escapeHtml(sm.rationale || '');
    const sources = (sm.sources || []).map(s =>
      `<li><a href="${escapeHtml(s.url || '#')}" target="_blank" rel="noopener">${escapeHtml(s.title || s.type || 'Source')}</a></li>`
    ).join('') || '<li>No sources on file.</li>';
    return `
      <div class="detail-group">
        <h4>${ax} — ${actor.scores[ax]?.toFixed(1)}</h4>
        <p class="rationale">${rationale}</p>
        <ul class="source-list">${sources}</ul>
      </div>
    `;
  }).join('');

  detail.innerHTML = `
    <td colspan="8">
      <div class="detail-panel">
        <div class="detail-group">
          <h4>Metadata</h4>
          <p>Version: ${escapeHtml(meta.version || '')}</p>
          <p>Last updated: ${date}</p>
          <p>Curator: ${escapeHtml(meta.curator || '')}</p>
          <p><a href="${jsonUrl}" target="_blank" rel="noopener">View raw JSON ↗</a></p>
        </div>
        ${axisDetails}
      </div>
    </td>
  `;

  tr.after(detail);
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sortActors(actors, col, dir) {
  const sorted = [...actors];
  sorted.sort((a, b) => {
    let av, bv;
    if (col === 'name') { av = a.name; bv = b.name; }
    else if (col === 'category') { av = (a._actorMeta || {}).category || ''; bv = (b._actorMeta || {}).category || ''; }
    else { av = a.scores[col] ?? -1; bv = b.scores[col] ?? -1; }
    if (av < bv) return dir === 'asc' ? -1 : 1;
    if (av > bv) return dir === 'asc' ? 1 : -1;
    return 0;
  });
  return sorted;
}

function filterActors(actors, q) {
  if (!q) return actors;
  const term = q.toLowerCase();
  return actors.filter(a => {
    const meta = a._actorMeta || {};
    const sm = a._scoreMeta || {};
    return a.name.toLowerCase().includes(term)
      || (meta.category || '').toLowerCase().includes(term)
      || Object.values(sm).some(v =>
        (v.rationale || '').toLowerCase().includes(term)
        || (v.sources || []).some(s => (s.title || '').toLowerCase().includes(term))
      );
  });
}

// Init
let displayed = sortActors(ACTORS, currentSort.col, currentSort.dir);
render(displayed);

// Sort clicks
document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.sort;
    const dir = currentSort.col === col && currentSort.dir === 'asc' ? 'desc' : 'asc';
    currentSort = { col, dir };

    document.querySelectorAll('th').forEach(t => t.classList.remove('asc','desc'));
    th.classList.add(dir);

    const q = document.getElementById('search').value;
    displayed = sortActors(filterActors(ACTORS, q), col, dir);
    render(displayed);
  });
});

// Search
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value;
  displayed = sortActors(filterActors(ACTORS, q), currentSort.col, currentSort.dir);
  render(displayed);
});
</script>
</body>
</html>
