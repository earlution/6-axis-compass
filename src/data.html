<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actor Data — Six-Axis Political Compass</title>
<meta name="description" content="Browse the complete dataset of political actor positions across six axes.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
/* styles.css will be inlined here by build.js */
</style>
</head>
<body class="data-page">
<a href="#data-main" class="skip-link">Skip to main content</a>
<div id="data-main" class="page-main">
<div class="wrap">
  <header class="data-page-header">
    <h1>Actor Dataset</h1>
    <p class="data-subtitle">Browse all scored political actors. Every score is traceable to primary sources. Tap a row or card to expand detail.</p>
  </header>

  <div class="data-controls">
    <input type="text" class="data-search" id="search" placeholder="Search actors, categories, or sources..." aria-label="Search actors">
    <span class="data-count" id="count"></span>
  </div>

  <div class="data-legend">
    <span class="data-legend-label">Confidence:</span>
    <span class="legend-item"><span class="conf conf-very-high">very high</span></span>
    <span class="legend-item"><span class="conf conf-high">high</span></span>
    <span class="legend-item"><span class="conf conf-medium">medium</span></span>
    <span class="legend-item"><span class="conf conf-low">low</span></span>
  </div>

  <div class="data-cards" id="data-cards" aria-label="Actor cards"></div>

  <div class="data-table-wrap">
    <table class="data-table" role="grid" aria-label="Actor dataset">
      <thead>
        <tr>
          <th data-sort="name">Actor <span class="sort"></span></th>
          <th class="col-category" data-sort="category">Category <span class="sort"></span></th>
          <th data-sort="Cultural">Cultural <span class="sort"></span></th>
          <th data-sort="Economic">Economic <span class="sort"></span></th>
          <th data-sort="Military">Military <span class="sort"></span></th>
          <th data-sort="Sovereignty">Sovereignty <span class="sort"></span></th>
          <th data-sort="Governance">Governance <span class="sort"></span></th>
          <th data-sort="Class">Class <span class="sort"></span></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
</div>
<script>
// ACTOR_DATA and ACTOR_GROUPS will be injected by build.js
const ACTORS = __ACTORS || [];
const AXES = ['Cultural','Economic','Military','Sovereignty','Governance','Class'];

let currentSort = { col: 'name', dir: 'asc' };
let expandedRow = null;
let expandedCard = null;
let groupOrder = [];

function loadGroupOrder() {
  try {
    const stored = localStorage.getItem('six-axis-compass-data-group-order');
    if (stored) groupOrder = JSON.parse(stored);
  } catch (_) {}
}

function saveGroupOrder() {
  try {
    localStorage.setItem('six-axis-compass-data-group-order', JSON.stringify(groupOrder));
  } catch (_) {}
}

function groupActors(actors) {
  const groups = [];
  const grouped = new Set();
  const orderMap = new Map(groupOrder.map((n, i) => [n, i]));

  for (const [groupName, actorNames] of Object.entries(ACTOR_GROUPS || {})) {
    const members = actors.filter(a => actorNames.includes(a.name));
    if (members.length > 0) {
      groups.push({ name: groupName, actors: members });
      members.forEach(a => grouped.add(a.name));
    }
  }

  const other = actors.filter(a => !grouped.has(a.name));
  if (other.length > 0) {
    groups.push({ name: 'Other', actors: other });
  }

  groups.sort((a, b) => {
    const ai = orderMap.get(a.name);
    const bi = orderMap.get(b.name);
    if (ai !== undefined && bi !== undefined) return ai - bi;
    if (ai !== undefined) return -1;
    if (bi !== undefined) return 1;
    return 0;
  });

  return groups;
}

function buildDetailHtml(actor) {
  const meta = actor._actorMeta || {};
  const scoreMeta = actor._scoreMeta || {};
  const jsonUrl = `https://github.com/earlution/6-axis-compass/blob/main/data/actors/${meta.slug || ''}.json`;
  const date = meta.lastUpdated ? new Date(meta.lastUpdated).toLocaleDateString('en-GB') : '';

  const axisDetails = AXES.map(ax => {
    const sm = scoreMeta[ax] || {};
    const rationale = escapeHtml(sm.rationale || '');
    const sources = (sm.sources || []).map(s =>
      `<li><a href="${escapeHtml(s.url || '#')}" target="_blank" rel="noopener">${escapeHtml(s.title || s.type || 'Source')}</a></li>`
    ).join('') || '<li>No sources on file.</li>';
    let dualRegHtml = '';
    if (actor.dualRegister) {
      const declared = actor.dualRegister.declared?.[ax];
      const structural = actor.dualRegister.structural?.[ax];
      const delta = actor.dualRegister.delta?.[ax];
      const conf = actor.dualRegister.confidence?.[ax];
      if (declared !== undefined && structural !== undefined) {
        const deltaStr = delta >= 0 ? '+' + delta.toFixed(1) : delta.toFixed(1);
        dualRegHtml = `<p class="rationale" style="margin-top:0.3rem;">Declared: ${declared.toFixed(1)} · Structural: ${structural.toFixed(1)} · Delta: ${deltaStr}${conf ? ` (${(conf.declared * 100).toFixed(0)}% / ${(conf.structural * 100).toFixed(0)}%)` : ''}</p>`;
      }
    }
    return `
      <div class="detail-group">
        <h4>${ax} — ${actor.scores[ax]?.toFixed(1)}</h4>
        <p class="rationale">${rationale}</p>
        ${dualRegHtml}
        <ul class="source-list">${sources}</ul>
      </div>
    `;
  }).join('');

  let dualRegMetaHtml = '';
  if (actor.dualRegister) {
    const dr = actor.dualRegister;
    dualRegMetaHtml = `
      <div class="detail-group">
        <h4>Dual-Register</h4>
        <p>Protocol: ${escapeHtml(dr.protocol || '')}</p>
        <p>Period: ${escapeHtml(dr.period || '')}</p>
        <p>Status: ${escapeHtml(dr.status || '')}</p>
      </div>
    `;
  }

  return `
    <div class="detail-panel">
      <div class="detail-group">
        <h4>Metadata</h4>
        <p>Version: ${escapeHtml(meta.version || '')}</p>
        <p>Last updated: ${date}</p>
        <p>Curator: ${escapeHtml(meta.curator || '')}</p>
        <p><a href="${jsonUrl}" target="_blank" rel="noopener">View raw JSON ↗</a></p>
      </div>
      ${dualRegMetaHtml}
      ${axisDetails}
    </div>
  `;
}

function renderTable(groups) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  groups.forEach((group, groupIndex) => {
    const header = document.createElement('tr');
    header.className = 'group-header';

    const reorder = document.createElement('span');
    reorder.className = 'group-reorder';
    reorder.innerHTML = `
      <button aria-label="Move group up" ${groupIndex === 0 ? 'disabled' : ''}>↑</button>
      <button aria-label="Move group down" ${groupIndex === groups.length - 1 ? 'disabled' : ''}>↓</button>
    `;
    const upBtn = reorder.querySelector('button:first-child');
    const downBtn = reorder.querySelector('button:last-child');

    upBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (groupIndex > 0) {
        const newOrder = groups.map(g => g.name);
        [newOrder[groupIndex], newOrder[groupIndex - 1]] = [newOrder[groupIndex - 1], newOrder[groupIndex]];
        groupOrder = newOrder;
        saveGroupOrder();
        refresh();
      }
    });

    downBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (groupIndex < groups.length - 1) {
        const newOrder = groups.map(g => g.name);
        [newOrder[groupIndex], newOrder[groupIndex + 1]] = [newOrder[groupIndex + 1], newOrder[groupIndex]];
        groupOrder = newOrder;
        saveGroupOrder();
        refresh();
      }
    });

    const label = document.createElement('span');
    label.textContent = `${group.name} `;
    const count = document.createElement('span');
    count.style.cssText = 'color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0;';
    count.textContent = `(${group.actors.length})`;
    label.appendChild(count);

    const td = document.createElement('td');
    td.setAttribute('colspan', '8');
    td.appendChild(label);
    td.appendChild(reorder);
    header.appendChild(td);
    tbody.appendChild(header);

    for (const actor of group.actors) {
      const meta = actor._actorMeta || {};
      const scoreMeta = actor._scoreMeta || {};
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>
          <div class="data-actor-name">
            <span class="color-dot" style="background:${actor.color}"></span>
            ${escapeHtml(actor.name)}
          </div>
        </td>
        <td class="col-category">${escapeHtml(meta.category || '')}</td>
        ${AXES.map(ax => {
          const conf = scoreMeta[ax]?.confidence || 'medium';
          return `<td class="data-score">
            ${actor.scores[ax]?.toFixed(1)}
            <span class="conf conf-${conf}">${conf.replace('-',' ')}</span>
          </td>`;
        }).join('')}
      `;
      tr.addEventListener('click', () => toggleTableDetail(tr, actor));
      tbody.appendChild(tr);
    }
  });
}

function renderCards(groups) {
  const container = document.getElementById('data-cards');
  container.innerHTML = '';

  groups.forEach((group, groupIndex) => {
    const groupEl = document.createElement('div');
    groupEl.className = 'data-card-group';
    groupEl.innerHTML = `<span>${group.name} (${group.actors.length})</span>`;
    container.appendChild(groupEl);

    group.actors.forEach(actor => {
      const meta = actor._actorMeta || {};
      const card = document.createElement('article');
      card.className = 'data-card';
      card.dataset.actor = actor.name;

      const topAxes = AXES.slice(0, 6);
      card.innerHTML = `
        <div class="data-card__header">
          <div class="data-actor-name">
            <span class="color-dot" style="background:${actor.color}"></span>
            ${escapeHtml(actor.name)}
          </div>
          <span class="conf conf-medium">${escapeHtml(meta.category || '')}</span>
        </div>
        <div class="data-card__scores">
          ${topAxes.map(ax => `
            <div class="data-card__score-item">
              <span>${ax.slice(0, 3)}</span>
              <span class="data-card__score-val">${actor.scores[ax]?.toFixed(1)}</span>
            </div>
          `).join('')}
        </div>
        <div class="data-card__detail">${buildDetailHtml(actor)}</div>
      `;

      card.querySelector('.data-card__header').addEventListener('click', () => toggleCardDetail(card));
      container.appendChild(card);
    });
  });
}

function toggleCardDetail(card) {
  if (expandedCard && expandedCard !== card) {
    expandedCard.classList.remove('is-expanded');
  }
  const open = card.classList.toggle('is-expanded');
  expandedCard = open ? card : null;
}

function toggleTableDetail(tr, actor) {
  if (expandedRow && expandedRow !== tr) {
    const existing = expandedRow.nextElementSibling;
    if (existing && existing.classList.contains('detail')) existing.remove();
    expandedRow.classList.remove('expanded');
  }

  const next = tr.nextElementSibling;
  if (next && next.classList.contains('detail')) {
    next.remove();
    tr.classList.remove('expanded');
    expandedRow = null;
    return;
  }

  tr.classList.add('expanded');
  expandedRow = tr;

  const detail = document.createElement('tr');
  detail.className = 'detail';
  detail.innerHTML = `<td colspan="8">${buildDetailHtml(actor)}</td>`;
  tr.after(detail);
}

function render(groups) {
  let totalActors = 0;
  for (const g of groups) totalActors += g.actors.length;

  if (totalActors === 0) {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="8" class="data-empty">No actors match your search.</td></tr>';
    document.getElementById('data-cards').innerHTML = '<p class="data-empty">No actors match your search.</p>';
    document.getElementById('count').textContent = '0 actors';
    return;
  }

  document.getElementById('count').textContent = `${totalActors} actor${totalActors !== 1 ? 's' : ''}`;
  renderTable(groups);
  renderCards(groups);
}

function refresh() {
  expandedRow = null;
  expandedCard = null;
  const q = document.getElementById('search').value;
  const filtered = filterActors(ACTORS, q);
  const sorted = sortActors(filtered, currentSort.col, currentSort.dir);
  render(groupActors(sorted));
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sortActors(actors, col, dir) {
  const sorted = [...actors];
  sorted.sort((a, b) => {
    let av, bv;
    if (col === 'name') { av = a.name; bv = b.name; }
    else if (col === 'category') { av = (a._actorMeta || {}).category || ''; bv = (b._actorMeta || {}).category || ''; }
    else { av = a.scores[col] ?? -1; bv = b.scores[col] ?? -1; }
    if (av < bv) return dir === 'asc' ? -1 : 1;
    if (av > bv) return dir === 'asc' ? 1 : -1;
    return 0;
  });
  return sorted;
}

function filterActors(actors, q) {
  if (!q) return actors;
  const term = q.toLowerCase();
  return actors.filter(a => {
    const meta = a._actorMeta || {};
    const sm = a._scoreMeta || {};
    return a.name.toLowerCase().includes(term)
      || (meta.category || '').toLowerCase().includes(term)
      || Object.values(sm).some(v =>
        (v.rationale || '').toLowerCase().includes(term)
        || (v.sources || []).some(s => (s.title || '').toLowerCase().includes(term))
      );
  });
}

loadGroupOrder();
refresh();

document.querySelectorAll('.data-table th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.sort;
    const dir = currentSort.col === col && currentSort.dir === 'asc' ? 'desc' : 'asc';
    currentSort = { col, dir };
    document.querySelectorAll('.data-table th').forEach(t => t.classList.remove('asc','desc'));
    th.classList.add(dir);
    refresh();
  });
});

document.getElementById('search').addEventListener('input', () => refresh());

initChrome({ page: 'dataset', version: '{{VERSION}}' });
</script>
</body>
</html>
