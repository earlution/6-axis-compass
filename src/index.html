<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Six-Axis Political Compass</title>
<meta name="description" content="Map your position across six political axes: Cultural, Economic, Military, Sovereignty, Governance, and Class.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<style>
/* styles.css will be inlined here by build.js */
</style>
</head>
<body>
<a href="#app" class="skip-link">Skip to main content</a>
<div id="app" role="main"></div>
<div id="announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>
<footer class="site-footer">
  <span class="footer-copy">© 2026 Ruari Mears</span>
  <span class="footer-sep">·</span>
  <a class="footer-link" href="https://github.com/earlution/6-axis-compass/blob/main/LICENCE" target="_blank" rel="noopener">MIT Licence</a>
  <span class="footer-sep">·</span>
  <a class="footer-link" href="data.html">Dataset</a>
  <span class="footer-sep">·</span>
  <span class="footer-ver">v{{VERSION}}</span>
</footer>
<script type="module">
import { AXES, ACTOR_GROUPS } from './data.js';
import { createQuiz } from './quiz.js';
import { renderIntro, renderQuiz, renderResults } from './ui.js';
import { downloadChart, downloadMapData, parseUpload } from './export.js';
import { t, setLanguage } from './i18n.js';
import { encodeHash, decodeHash, copyToClipboard } from './url.js';

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

const app = document.getElementById('app');
let quiz;
let selectedActors = new Set();
let orientation = 'flat';
let axesOrder = [...AXES];
let showUser = true;
let uploadedMap = null;
let language = 'en';
let theme = 'dark';
let customActors = [];
let invertedAxes = new Set();
let actorGroupOrder = [];

function loadActorGroupOrder() {
  try {
    const stored = localStorage.getItem('six-axis-compass-actor-group-order');
    if (stored) actorGroupOrder = JSON.parse(stored);
  } catch (_) {}
}

function saveActorGroupOrder() {
  try {
    localStorage.setItem('six-axis-compass-actor-group-order', JSON.stringify(actorGroupOrder));
  } catch (_) {}
}

function loadCustomActors() {
  try {
    const stored = localStorage.getItem('six-axis-compass-custom-actors');
    if (stored) customActors = JSON.parse(stored);
  } catch (_) {}
}

function saveCustomActors() {
  try {
    localStorage.setItem('six-axis-compass-custom-actors', JSON.stringify(customActors));
  } catch (_) {}
}

function loadTheme() {
  try {
    const stored = localStorage.getItem('six-axis-compass-theme');
    if (stored === 'light' || stored === 'dark') theme = stored;
  } catch (_) {}
}

function saveTheme() {
  try {
    localStorage.setItem('six-axis-compass-theme', theme);
  } catch (_) {}
}

function loadInvertedAxes() {
  try {
    const stored = localStorage.getItem('six-axis-compass-inverted-axes');
    if (stored) invertedAxes = new Set(JSON.parse(stored));
  } catch (_) {}
}

function saveInvertedAxes() {
  try {
    localStorage.setItem('six-axis-compass-inverted-axes', JSON.stringify([...invertedAxes]));
  } catch (_) {}
}

loadCustomActors();
loadTheme();
loadInvertedAxes();
loadActorGroupOrder();
document.documentElement.setAttribute('data-theme', theme);

function announce(message) {
  const el = document.getElementById('announcer');
  if (el) el.textContent = message;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) {
    el.classList.add('active');
    el.focus();
    const label = el.getAttribute('aria-label');
    if (label) announce(label);
  }
  window.scrollTo(0, 0);
}

function startQuiz() {
  quiz = createQuiz();
  renderQuizScreen();
}

function renderQuizScreen() {
  renderQuiz(app, {
    question: quiz.question,
    progress: quiz.progress,
    stepLabel: quiz.stepLabel,
    axis: quiz.question.axis,
    onAnswer: handleAnswer,
    onBack: goBack,
    canGoBack: quiz.current > 0
  });
}

function handleAnswer(value) {
  const complete = quiz.answer(value);
  if (complete) {
    showResults();
  } else {
    renderQuizScreen();
  }
}

function goBack() {
  quiz.back();
  renderQuizScreen();
}

function loadFromHash() {
  const decoded = decodeHash(window.location.hash);
  if (!decoded) return false;
  orientation = decoded.orientation;
  if (decoded.axesOrder && decoded.axesOrder.length === 6) {
    axesOrder = decoded.axesOrder;
  }
  if (decoded.invertedAxes && decoded.invertedAxes.length > 0) {
    invertedAxes = new Set(decoded.invertedAxes);
  }
  quiz = {
    getScores: () => decoded.scores,
    getAnswers: () => ({}),
    current: 24,
    total: 24,
    isComplete: true
  };
  showResults();
  return true;
}

function showResults() {
  const scores = quiz.getScores();
  window.location.hash = encodeHash(scores, orientation, axesOrder, invertedAxes);
  renderResults(app, {
    scores,
    axes: axesOrder,
    orientation,
    showUser,
    selectedActors,
    uploadedMap,
    invertedAxes,
    onToggleActor: name => {
      selectedActors.has(name) ? selectedActors.delete(name) : selectedActors.add(name);
      showResults();
    },
    onRestart: () => {
      orientation = 'flat';
      axesOrder = [...AXES];
      showUser = true;
      uploadedMap = null;
      selectedActors.clear();
      invertedAxes = new Set();
      actorGroupOrder = [];
      saveInvertedAxes();
      saveActorGroupOrder();
      window.location.hash = '';
      renderIntro(app, { onStart: startQuiz, onUpload: handleIntroUpload });
    },
    onDownloadChart: () => {
      const svg = document.getElementById('radar');
      if (svg) downloadChart(svg);
    },
    onDownloadData: (format) => {
      downloadMapData(scores, format);
    },
    onUpload: (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (evt) => {
        try {
          uploadedMap = parseUpload(evt.target.result, file.name);
          showResults();
        } catch (err) {
          alert(t('error.upload') + err.message);
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    },
    onClearUpload: () => {
      uploadedMap = null;
      showResults();
    },
    onToggleUser: () => {
      showUser = !showUser;
      showResults();
    },
    onSetOrientation: (o) => {
      orientation = o;
      showResults();
    },
    onReorder: (newOrder) => {
      axesOrder = newOrder;
      showResults();
    },
    onSetLanguage: (lang) => {
      language = lang;
      setLanguage(lang);
      showResults();
    },
    onCopyLink: () => {
      copyToClipboard(window.location.href);
    },
    customActors,
    onAddCustomActor: (actor) => {
      if (customActors.some(c => c.name === actor.name)) return;
      customActors.push(actor);
      selectedActors.add(actor.name);
      saveCustomActors();
      showResults();
    },
    onDeleteCustomActor: (name) => {
      customActors = customActors.filter(c => c.name !== name);
      selectedActors.delete(name);
      saveCustomActors();
      showResults();
    },
    onToggleInvertAxis: (ax) => {
      invertedAxes.has(ax) ? invertedAxes.delete(ax) : invertedAxes.add(ax);
      saveInvertedAxes();
      showResults();
    },
    onReorderGroups: (newOrder) => {
      actorGroupOrder = newOrder;
      saveActorGroupOrder();
      showResults();
    },
    groupOrder: actorGroupOrder,
    language,
    theme,
    onSetTheme: (t) => {
      theme = t;
      saveTheme();
      document.documentElement.setAttribute('data-theme', theme);
      showResults();
    }
  });
}

function handleIntroUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      const result = parseUpload(evt.target.result, file.name);
      quiz = {
        getScores: () => result.scores,
        getAnswers: () => ({}),
        current: 24,
        total: 24,
        isComplete: true
      };
      showResults();
    } catch (err) {
      alert(t('error.upload') + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

if (!loadFromHash()) {
  renderIntro(app, { onStart: startQuiz, onUpload: handleIntroUpload });
}
</script>
</body>
</html>
