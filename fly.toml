# Fly.io app config for the merch checkout API
# Deploy: fly deploy (from repo root, after setting secrets)

app = "six-axis-compass-api"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile.api"

[env]
  API_PUBLIC_READ = "true"
  MERCH_ARTWORK_STORAGE = "local"
  MERCH_ARTWORK_PUBLIC_ORIGIN = "https://api.6axiscompass.uk"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"

[[mounts]]
  source = "merch_data"
  destination = "/app/api/data"
